<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Emerald Enhanced — GBA</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #000;
            color: #c8d8e8;
            font-family: "Courier New", Courier, monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }
        #top-bar {
            width: 100%;
            background: #0a1830;
            border-bottom: 1px solid #18b8c8;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 10px;
            gap: 8px;
        }
        #top-bar a {
            color: #18b8c8;
            text-decoration: none;
            font-size: 12px;
            border: 1px solid #18b8c8;
            border-radius: 3px;
            padding: 4px 8px;
            touch-action: manipulation;
        }
        #top-bar span {
            font-size: 12px;
            color: #80d0e8;
        }
        #screenshot-btn-emu {
            background: #0a1830;
            color: #18b8c8;
            border: 1px solid #18b8c8;
            border-radius: 3px;
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
            font-family: "Courier New", Courier, monospace;
            touch-action: manipulation;
        }
        #emu-wrap {
            width: 100%;
            max-width: 640px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        #game {
            width: 100%;
            min-height: 400px;
            flex: 1;
        }
        #status {
            padding: 8px 12px;
            font-size: 11px;
            color: #80d0e8;
            background: #0a1830;
            border-top: 1px solid #18b8c8;
            min-height: 24px;
        }
    </style>
</head>
<body>
    <div id="top-bar">
        <a href="index.html">&#8592; Menu</a>
        <span>Emerald Enhanced</span>
        <button id="screenshot-btn-emu">&#128247; Screenshot</button>
    </div>

    <div id="emu-wrap">
        <div id="game"></div>
        <div id="status">Loading emulator…</div>
    </div>

    <script>
        // Register service worker for caching ROM + EmulatorJS assets
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(function(reg) {
                var s = document.getElementById('status');
                if (reg.installing) {
                    if (s) s.textContent = 'Downloading game data (cached after first run)…';
                } else if (reg.active) {
                    if (s) s.textContent = 'Loading from cache…';
                }
            });
        }
    </script>
    <script>
        // EmulatorJS config
        window.EJS_player = '#game';
        window.EJS_core = 'gba';
        window.EJS_gameUrl = 'pokeemerald_ee_debug.gba';
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        window.EJS_color = '#18b8c8';
        window.EJS_backgroundColor = '#060610';
        window.EJS_startOnLoaded = true;
        window.EJS_onGameStart = function() {
            var s = document.getElementById('status');
            if (s) s.textContent = 'Running — Emerald Enhanced';
        };
        window.EJS_onLoadState = function() {};
        // Intercept errors
        window.addEventListener('error', function(e) {
            var s = document.getElementById('status');
            if (s) s.textContent = 'Error: ' + e.message + ' (' + (e.filename||'') + ':' + e.lineno + ')';
        });
        window.EJS_Buttons = {
            playPause: true,
            restart: true,
            mute: true,
            settings: true,
            fullscreen: true,
            saveState: true,
            loadState: true,
            screenRecord: false,
            gamepad: true,
            cheat: false,
            volume: true,
            saveSavFiles: true,
            loadSavFiles: true,
            quickSave: true,
            quickLoad: true,
        };
    </script>
    <script>
        // Verify ROM is reachable before loading EmulatorJS
        var statusEl = document.getElementById('status');
        fetch('pokeemerald_ee_debug.gba', { method: 'HEAD' })
            .then(function(r) {
                if (r.ok) {
                    if (statusEl) statusEl.textContent = 'ROM found (' + (r.headers.get('content-length')||'?') + ' bytes) — loading emulator…';
                } else {
                    if (statusEl) statusEl.textContent = 'ERROR: ROM not found at pokeemerald_ee_debug.gba (HTTP ' + r.status + ')';
                }
            })
            .catch(function(e) {
                if (statusEl) statusEl.textContent = 'ERROR fetching ROM: ' + e.message;
            });
    </script>
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"
            onerror="document.getElementById('status').textContent='ERROR: Failed to load EmulatorJS CDN — check internet connection.'">
    </script>

    <script>
        document.getElementById('screenshot-btn-emu').addEventListener('click', function() {
            var canvas = document.querySelector('#game canvas');
            if (!canvas) { alert('Emulator not loaded yet.'); return; }

            var token = localStorage.getItem('gh_debug_token');
            if (!token) {
                token = prompt('Enter your GitHub token (public_repo scope):');
                if (!token) return;
                localStorage.setItem('gh_debug_token', token);
            }

            var dataUrl = canvas.toDataURL('image/jpeg', 0.85);
            var ext = dataUrl.startsWith('data:image/png') ? 'png' : 'jpg';
            var base64 = dataUrl.replace(/^data:image\/(jpeg|png);base64,/, '');
            var ts = new Date().toISOString().replace(/[:.]/g, '-');
            var path = 'screenshots/ee-shot-' + ts + '.' + ext;

            fetch('https://api.github.com/repos/knightdx91-alt/pokemon-game/contents/' + path, {
                method: 'PUT',
                headers: { Authorization: 'token ' + token, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: 'ee screenshot ' + ts, content: base64, branch: 'screenshots' })
            })
            .then(function(r) {
                if (!r.ok) return r.text().then(function(t){ var m=t; try{m=JSON.parse(t).message||t;}catch(e){} throw new Error(r.status+': '+m); });
                var btn = document.getElementById('screenshot-btn-emu');
                if (btn) { btn.style.color = '#20d840'; setTimeout(function(){ btn.style.color = '#18b8c8'; }, 2000); }
            })
            .catch(function(e) { alert('Screenshot error:\n' + e.message); });
        });
    </script>
</body>
</html>
