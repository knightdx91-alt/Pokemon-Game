<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light only">
    <meta name="darkreader-lock">
    <title>Emulator — RetroPlay</title>
    <style>
        :root {
            --bg:       #0d0d0f;
            --surface:  #17171a;
            --surface2: #1f1f24;
            --border:   #2a2a30;
            --accent:   #7c6af7;
            --accent2:  #a898ff;
            --text:     #f0eeff;
            --muted:    #888;
            --danger:   #e05454;
            --success:  #4caf88;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
        }
        #setup-screen {
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; padding: 2rem 1rem 5rem;
        }
        .logo {
            margin: 2.5rem 0 0.5rem; font-size: 2.2rem; font-weight: 700;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #a898ff, #7c6af7, #f07aff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .tagline { color: var(--muted); font-size: 0.95rem; margin-bottom: 2.5rem; }
        .systems-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
            padding: 2rem; width: 100%; max-width: 680px; margin-bottom: 1.5rem;
        }
        .systems-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
        .systems-card h2 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 0; }
        .category-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: #555; margin: 1.25rem 0 0.5rem; }
        .system-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 0.5rem; }
        .sys-card {
            background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
            color: var(--text); cursor: pointer; padding: 0.6rem 0.5rem; text-align: center;
            transition: all 0.15s; display: flex; flex-direction: column; align-items: center; gap: 4px; font-family: inherit;
        }
        .sys-card:hover    { border-color: var(--accent); background: #1e1c2e; }
        .sys-card.selected { border-color: var(--accent); background: #1e1c2e; box-shadow: 0 0 0 1px var(--accent); color: var(--accent2); }
        .sys-card.has-cache .sys-name::after { content: ' \B7'; color: var(--accent); }
        .sys-icon { font-size: 1.3rem; }
        .sys-name { font-size: 0.75rem; font-weight: 600; line-height: 1.2; }
        .launch-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
            padding: 1.75rem 2rem; width: 100%; max-width: 680px;
            display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1rem;
        }
        .launch-top { display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
        .selected-info { display: flex; align-items: center; gap: 14px; }
        .sel-icon { font-size: 2rem; line-height: 1; }
        .sel-name { font-size: 1rem; font-weight: 600; }
        .sel-ext  { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
        .launch-btns { display: flex; gap: 8px; flex-wrap: wrap; }
        .url-row { display: flex; gap: 8px; align-items: stretch; border-top: 1px solid var(--border); padding-top: 1rem; }
        .url-row input {
            flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
            color: var(--text); font-family: inherit; font-size: 0.85rem; padding: 0.65rem 0.9rem;
            outline: none; transition: border-color 0.15s; min-width: 0;
        }
        .url-row input::placeholder { color: #555; }
        .url-row input:focus { border-color: var(--accent); }
        .url-row input:disabled { opacity: 0.5; }
        .btn-primary {
            background: var(--accent); border: none; border-radius: 10px; color: #fff;
            cursor: pointer; font-family: inherit; font-size: 0.9rem; font-weight: 600;
            padding: 0.7rem 1.4rem; transition: background 0.15s, transform 0.1s;
            display: flex; align-items: center; gap: 8px; white-space: nowrap;
        }
        .btn-primary:hover   { background: #6a59e0; }
        .btn-primary:active  { transform: scale(0.97); }
        .btn-primary:disabled { background: #333; color: #666; cursor: not-allowed; }
        .btn-ghost {
            background: none; border: 1px solid var(--border); border-radius: 10px;
            color: var(--muted); cursor: pointer; font-family: inherit; font-size: 0.9rem;
            padding: 0.7rem 1.2rem; transition: color 0.15s, border-color 0.15s; white-space: nowrap;
        }
        .btn-ghost:hover        { color: var(--text); border-color: #3a3a4a; }
        .btn-ghost.play         { color: var(--accent2); border-color: #3a3260; }
        .btn-ghost.play:hover   { border-color: var(--accent); }
        .btn-ghost.danger       { color: var(--danger); border-color: #3a2a2a; }
        .btn-ghost.danger:hover { border-color: var(--danger); }
        .cache-badge-btn {
            background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
            color: var(--muted); cursor: pointer; font-family: inherit; font-size: 0.78rem;
            padding: 0.4rem 0.75rem; display: flex; align-items: center; gap: 6px;
            transition: color 0.15s, border-color 0.15s; white-space: nowrap;
        }
        .cache-badge-btn:hover { color: var(--accent2); border-color: var(--accent); }
        .cache-badge-btn .cd-icon { font-size: 1.1rem; line-height: 1; }
        #cache-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px); z-index: 200; align-items: center; justify-content: center; padding: 20px;
        }
        #cache-overlay.visible { display: flex; }
        #cache-panel {
            background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
            width: 100%; max-width: 480px; max-height: 75vh; display: flex; flex-direction: column; overflow: hidden;
        }
        #cache-header {
            padding: 16px 20px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        #cache-header span { font-size: 14px; font-weight: 600; }
        #btn-close-cache {
            background: none; color: var(--muted); border: 1px solid var(--border);
            border-radius: 8px; padding: 4px 10px; font-size: 12px; cursor: pointer; font-family: inherit;
        }
        #btn-close-cache:hover { color: var(--text); }
        #cache-list { overflow-y: auto; flex: 1; }
        .cache-row { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-bottom: 1px solid #1a1a20; }
        .cache-row:last-child { border-bottom: none; }
        .btn-play-row {
            background: var(--accent); color: #fff; border: none; border-radius: 8px;
            padding: 8px 12px; font-size: 13px; font-weight: 600; cursor: pointer;
            font-family: inherit; flex-shrink: 0; transition: background 0.1s; white-space: nowrap;
        }
        .btn-play-row:hover { background: #9080ff; }
        .cache-info { flex: 1; min-width: 0; }
        .cache-sys  { font-size: 13px; font-weight: 600; }
        .cache-file { font-size: 11px; color: #4a4a5a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
        .cache-size { font-size: 11px; color: var(--muted); white-space: nowrap; }
        .btn-del-row {
            background: none; color: #4a4a5a; border: 1px solid var(--border); border-radius: 6px;
            padding: 4px 8px; font-size: 11px; cursor: pointer; font-family: inherit;
            flex-shrink: 0; transition: color 0.1s, border-color 0.1s;
        }
        .btn-del-row:hover { color: var(--danger); border-color: var(--danger); }
        #cache-empty { padding: 32px; text-align: center; font-size: 13px; color: #4a4a5a; }
        #emu-screen { display: none; flex-direction: column; height: 100vh; }
        #emu-screen.visible { display: flex; }
        .emu-topbar {
            background: var(--surface); border-bottom: 1px solid var(--border);
            padding: 0.6rem 1.25rem; display: flex; align-items: center; gap: 1rem; flex-shrink: 0;
        }
        .logo-small {
            font-weight: 700; font-size: 1.1rem;
            background: linear-gradient(135deg, #a898ff, #7c6af7);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; white-space: nowrap;
        }
        .emu-info { flex: 1; min-width: 0; }
        .emu-game-name { font-size: 0.9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .emu-sys-name  { font-size: 0.75rem; color: var(--muted); }
        .btn-back {
            background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
            color: var(--text); cursor: pointer; font-family: inherit; font-size: 0.82rem;
            padding: 0.4rem 0.85rem; transition: border-color 0.15s; white-space: nowrap; flex-shrink: 0;
        }
        .btn-back:hover { border-color: var(--accent); }
        #btn-screenshot, #btn-save-game, #btn-load-game {
            background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
            color: var(--text); cursor: pointer; font-family: inherit; font-size: 0.82rem;
            padding: 0.4rem 0.85rem; transition: border-color 0.15s, color 0.15s; white-space: nowrap; flex-shrink: 0;
        }
        #btn-screenshot:hover { border-color: var(--accent2); }
        #btn-save-game:hover  { border-color: var(--success); color: var(--success); }
        #btn-load-game:hover  { border-color: var(--accent2); color: var(--accent2); }
        #btn-save-game:disabled, #btn-load-game:disabled { opacity: 0.45; cursor: not-allowed; }
        #screenshot-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.82); z-index: 2000;
            align-items: center; justify-content: center;
        }
        #screenshot-modal.visible { display: flex; }
        #screenshot-modal-inner {
            background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
            padding: 1.25rem; max-width: 520px; width: 90%; display: flex; flex-direction: column; gap: 0.75rem;
        }
        #screenshot-modal-inner img { width: 100%; border-radius: 6px; image-rendering: pixelated; }
        #screenshot-link-box { display: flex; gap: 0.5rem; }
        #screenshot-link-input {
            flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
            color: var(--text); font-family: inherit; font-size: 0.78rem; padding: 0.4rem 0.6rem;
        }
        #screenshot-copy-btn, #screenshot-close-btn {
            background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
            color: var(--text); cursor: pointer; font-family: inherit; font-size: 0.78rem;
            padding: 0.4rem 0.7rem; white-space: nowrap;
        }
        #screenshot-copy-btn:hover { border-color: var(--accent2); }
        #screenshot-close-btn:hover { border-color: var(--danger); }
        #screenshot-status { font-size: 0.75rem; color: var(--muted); min-height: 1em; }
        #game {
            width: 100%; flex: 1; background: #000; min-height: 0;
            -webkit-touch-callout: none; -webkit-user-select: none;
            user-select: none; touch-action: manipulation;
        }
        #emu-progress-wrap { width: 100%; height: 4px; background: var(--surface2); flex-shrink: 0; }
        #emu-progress-fill { height: 100%; width: 0%; background: var(--accent); transition: width 0.3s ease; }
        #emu-status {
            padding: 6px 16px; font-size: 11px; color: #4a4a5a;
            background: var(--bg); border-top: 1px solid var(--border); flex-shrink: 0;
        }
        #emu-status.loading { color: var(--accent2); }
        .loading-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 999;
            align-items: center; justify-content: center; flex-direction: column; gap: 1rem;
        }
        .loading-overlay.visible { display: flex; }
        .spinner {
            width: 40px; height: 40px; border: 3px solid var(--border);
            border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: var(--muted); font-size: 0.9rem; text-align: center; max-width: 280px; }
        .loading-prog-wrap { width: 220px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
        .loading-prog-fill { height: 100%; width: 0%; background: var(--accent); transition: width 0.08s linear; border-radius: 2px; }
        .url-hint { font-size: 0.72rem; color: #555; line-height: 1.5; }
    </style>
</head>
<body>

<div id="setup-screen">
    <div class="logo">RetroPlay</div>
    <p class="tagline">Your ROMs, every system, one page.</p>
    <div class="systems-card">
        <div class="systems-card-header">
            <h2>&#127918; Pick a system</h2>
            <button class="cache-badge-btn" id="btn-open-cache"><span class="cd-icon">&#128189;</span> Cached ROMs</button>
        </div>
        <div id="picker-screen"></div>
    </div>
    <div class="launch-card">
        <div class="launch-top">
            <div class="selected-info">
                <div class="sel-icon" id="sel-icon-txt">&#10067;</div>
                <div>
                    <div class="sel-name" id="sel-name-txt">No system selected</div>
                    <div class="sel-ext"  id="sel-ext-txt">Choose a system above</div>
                </div>
            </div>
            <div class="launch-btns">
                <button class="btn-ghost play"  id="btn-play-cached" style="display:none">&#9654; Play cached</button>
                <button class="btn-primary"      id="btn-drive" disabled>&#128194; Pick from Drive</button>
                <button class="btn-ghost danger" id="btn-clear-cache" style="display:none">Delete cache</button>
            </div>
        </div>
        <div class="url-row">
            <input type="url" id="url-input" placeholder="Paste direct download URL (ZIP or ROM)" />
            <button class="btn-primary" id="btn-url-load" disabled>&#9654; Load</button>
        </div>
        <div class="url-hint">ZIP files are automatically handled. Google Drive: Share &rarr; copy link and paste as-is.</div>
    </div>
</div>

<div id="cache-overlay">
    <div id="cache-panel">
        <div id="cache-header"><span>Cached ROMs</span><button id="btn-close-cache">&#x2715; Close</button></div>
        <div id="cache-list"></div>
    </div>
</div>

<div id="emu-screen">
    <div class="emu-topbar">
        <span class="logo-small">RetroPlay</span>
        <div class="emu-info">
            <div class="emu-game-name" id="emu-game-label">&mdash;</div>
            <div class="emu-sys-name"  id="emu-sys-label">&mdash;</div>
        </div>
        <button id="btn-save-game">💾 Save</button>
        <button id="btn-load-game">📂 Load</button>
        <button id="btn-screenshot">📷 Screenshot</button>
        <button class="btn-back" id="btn-back-emu">&larr; Back</button>
    </div>
    <div id="game"></div>
    <div id="emu-progress-wrap"><div id="emu-progress-fill"></div></div>
    <div id="emu-status">Loading emulator&hellip;</div>
</div>

<div id="screenshot-modal">
    <div id="screenshot-modal-inner">
        <img id="screenshot-preview" src="" alt="screenshot">
        <div id="screenshot-status">Uploading…</div>
        <div id="screenshot-link-box">
            <input id="screenshot-link-input" type="text" readonly placeholder="Link will appear here…">
            <button id="screenshot-copy-btn">Copy</button>
            <button id="screenshot-close-btn">Close</button>
        </div>
    </div>
</div>

<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">Loading&hellip;</div>
    <div class="loading-prog-wrap"><div class="loading-prog-fill" id="loadingProgFill"></div></div>
</div>

<script>
(function () {

    /* ---- NDS BIOS stub ZIP (pure JS, no external deps) ----
       Builds a minimal store-compressed ZIP with 1-byte placeholder files
       for bios7.bin, bios9.bin, firmware.bin.  desmume2015 detects invalid
       BIOS and falls back to internal HLE BIOS automatically.
       This data URL is passed as EJS_biosUrl so the core never fetches BIOS
       from the CDN (which may be blocked on restricted devices). */
    var _ndsBiosDataUrl = (function () {
        var names = ['bios7.bin', 'bios9.bin', 'firmware.bin'];
        var localBufs = [], cdBufs = [], offset = 0;
        names.forEach(function (name) {
            var nb = name.length;
            /* Local file header (30 bytes) + filename + 1 data byte */
            var lh = new Uint8Array(30 + nb + 1);
            lh[0]=0x50; lh[1]=0x4B; lh[2]=0x03; lh[3]=0x04; /* PK local sig */
            lh[4]=20;                  /* version needed: 2.0 */
            /* bytes 6-13: flags=0, compression=STORE(0), modtime=0, moddate=0 */
            /* bytes 14-17: CRC-32 = 0 (stub content, emulator ignores) */
            lh[18]=1;                  /* compressed size = 1 */
            lh[22]=1;                  /* uncompressed size = 1 */
            lh[26]=nb;                 /* filename length */
            for (var i = 0; i < nb; i++) lh[30 + i] = name.charCodeAt(i);
            /* lh[30+nb] = 0x00 (the 1 data byte, already zeroed) */
            localBufs.push(lh);

            /* Central directory entry (46 bytes) + filename */
            var cd = new Uint8Array(46 + nb);
            cd[0]=0x50; cd[1]=0x4B; cd[2]=0x01; cd[3]=0x02; /* PK central sig */
            cd[4]=20; cd[6]=20;    /* versions */
            cd[20]=1;              /* compressed size = 1 */
            cd[24]=1;              /* uncompressed size = 1 */
            cd[28]=nb;             /* filename length */
            /* relative offset of local header (little-endian uint32) */
            cd[42]=offset&0xFF; cd[43]=(offset>>8)&0xFF;
            cd[44]=(offset>>16)&0xFF; cd[45]=(offset>>24)&0xFF;
            for (var i = 0; i < nb; i++) cd[46 + i] = name.charCodeAt(i);
            cdBufs.push(cd);

            offset += 30 + nb + 1;
        });

        var cdStart = offset;
        var cdSize = cdBufs.reduce(function (a, b) { return a + b.length; }, 0);

        /* End of central directory record */
        var eocd = new Uint8Array(22);
        eocd[0]=0x50; eocd[1]=0x4B; eocd[2]=0x05; eocd[3]=0x06;
        eocd[8]=names.length; eocd[10]=names.length; /* entry counts */
        eocd[12]=cdSize&0xFF;    eocd[13]=(cdSize>>8)&0xFF;
        eocd[14]=(cdSize>>16)&0xFF; eocd[15]=(cdSize>>24)&0xFF;
        eocd[16]=cdStart&0xFF;   eocd[17]=(cdStart>>8)&0xFF;
        eocd[18]=(cdStart>>16)&0xFF; eocd[19]=(cdStart>>24)&0xFF;

        var all = localBufs.concat(cdBufs).concat([eocd]);
        var total = all.reduce(function (a, b) { return a + b.length; }, 0);
        var out = new Uint8Array(total), pos = 0;
        all.forEach(function (b) { out.set(b, pos); pos += b.length; });

        /* Base64-encode without btoa chunking issues */
        var bin = '';
        for (var i = 0; i < out.length; i++) bin += String.fromCharCode(out[i]);
        return 'data:application/zip;base64,' + btoa(bin);
    })();

    /* Intercept fetch as a safety net for any BIOS requests the core makes
       directly (some versions fetch individual files instead of the zip). */
    var NDS_BIOS_SIZES = { 'bios7.bin': 16384, 'bios9.bin': 4096, 'firmware.bin': 524288 };
    var _origFetch = window.fetch;
    window.fetch = function (url, opts) {
        if (typeof url === 'string') {
            var file = url.split('/').pop().split('?')[0];
            var fl   = file.toLowerCase();
            if (NDS_BIOS_SIZES[file]) {
                return Promise.resolve(new Response(new Uint8Array(NDS_BIOS_SIZES[file]),
                    { status: 200, headers: { 'Content-Type': 'application/octet-stream' } }));
            }
            if (fl.indexOf('bios') !== -1 && fl.slice(-4) === '.zip') {
                /* Decode our pre-built data URL and return it directly */
                var b64 = _ndsBiosDataUrl.split(',')[1];
                var bin = atob(b64);
                var bytes = new Uint8Array(bin.length);
                for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
                return Promise.resolve(new Response(bytes,
                    { status: 200, headers: { 'Content-Type': 'application/zip' } }));
            }
        }
        return _origFetch.apply(this, arguments);
    };

    var _origGetCtx = HTMLCanvasElement.prototype.getContext;
    HTMLCanvasElement.prototype.getContext = function (type, attrs) {
        if (type === 'webgl' || type === 'webgl2' || type === 'experimental-webgl')
            attrs = Object.assign({}, attrs || {}, { preserveDrawingBuffer: true });
        return _origGetCtx.call(this, type, attrs);
    };

    var CDN = 'https://cdn.emulatorjs.org/stable/data/';

    var SYSTEMS = [
        { id:'nes',      label:'NES',             core:'fceumm',           exts:['.nes','.fds','.zip'],                      group:'Nintendo', icon:'&#127918;' },
        { id:'snes',     label:'SNES',            core:'snes9x',           exts:['.sfc','.smc','.fig','.zip'],               group:'Nintendo', icon:'&#128377;' },
        { id:'n64',      label:'Nintendo 64',     core:'mupen64plus_next', exts:['.n64','.z64','.v64','.zip'],               group:'Nintendo', icon:'&#127919;' },
        { id:'gb',       label:'Game Boy',        core:'gambatte',         exts:['.gb','.zip'],                              group:'Nintendo', icon:'&#127922;' },
        { id:'gbc',      label:'Game Boy Color',  core:'gambatte',         exts:['.gbc','.zip'],                             group:'Nintendo', icon:'&#127752;' },
        { id:'gba',      label:'GBA',             core:'mgba',             exts:['.gba','.zip'],                             group:'Nintendo', icon:'&#127916;' },
        { id:'nds',      label:'Nintendo DS',     core:'desmume2015',      exts:['.nds','.zip'],                             group:'Nintendo', icon:'&#128241;' },
        { id:'vb',       label:'Virtual Boy',     core:'beetle_vb',        exts:['.vb','.vboy','.zip'],                      group:'Nintendo', icon:'&#129405;' },
        { id:'pokemini', label:'Pokemon Mini',    core:'pokemini',         exts:['.min','.zip'],                             group:'Nintendo', icon:'&#11088;' },

    function isZipBlob(blob) {
        return blob.slice(0, 4).arrayBuffer().then(function (buf) {
            var b = new Uint8Array(buf);
            return b[0] === 0x50 && b[1] === 0x4B && b[2] === 0x03 && b[3] === 0x04;
        });
    }

    function extractFromZip(blob, sys) {
        return blob.arrayBuffer().then(function (buf) {
            return new Promise(function (res, rej) {
                if (typeof fflate === 'undefined') { rej(new Error('fflate not loaded')); return; }
                setDl('Extracting from ZIP…');
                fflate.unzip(new Uint8Array(buf), function (err, files) {
                    if (err) { rej(err); return; }
                    var keys = Object.keys(files);
                    var match = null, matchName = null;
                    var searchExts = sys.exts.filter(function (e) { return e !== '.zip'; });
                    for (var i = 0; i < searchExts.length && !match; i++) {
                        for (var j = 0; j < keys.length; j++) {
                            if (keys[j].toLowerCase().endsWith(searchExts[i])) {
                                match = files[keys[j]]; matchName = keys[j].split('/').pop(); break;
                            }
                        }
                    }
                    if (!match) {
                        var biggestSize = 0;
                        keys.forEach(function (k) {
                            if (files[k].length > biggestSize) { biggestSize = files[k].length; match = files[k]; matchName = k.split('/').pop(); }
                        });
                    }
                    if (!match) { rej(new Error('ZIP is empty')); return; }
                    res({ blob: new Blob([match], { type: 'application/octet-stream' }), name: matchName });
                });
            });
        });
    }

    function prepareAndLaunch(sys, blob, fileName) {
        if (ZIP_NATIVE[sys.id]) { cacheAndLaunch(sys, blob, fileName); return; }
        isZipBlob(blob).then(function (isZip) {
            if (!isZip) { cacheAndLaunch(sys, blob, fileName); return; }
            if (typeof fflate === 'undefined') {
                /* fflate not loaded — treat ZIP as native pass-through */
                cacheAndLaunch(sys, blob, fileName);
                return;
            }
            extractFromZip(blob, sys)
                .then(function (r) { cacheAndLaunch(sys, r.blob, r.name); })
                .catch(function (err) { hideLoading(); alert('ZIP extraction failed: ' + err.message); });
        });
    }

    function openDB() {
        return new Promise(function (res, rej) {
            var r = indexedDB.open(IDB_DB, 1);
            r.onupgradeneeded = function (e) {
                var db = e.target.result;
                if (!db.objectStoreNames.contains(ROM_STORE))  db.createObjectStore(ROM_STORE);
                if (!db.objectStoreNames.contains(META_STORE)) db.createObjectStore(META_STORE);
            };
            r.onsuccess = function (e) { res(e.target.result); };
            r.onerror   = function (e) { rej(e.target.error); };
        });
    }
    function idbGet(db, store, key) {
        return new Promise(function (res, rej) {
            var r = db.transaction(store,'readonly').objectStore(store).get(key);
            r.onsuccess = function (e) { res(e.target.result || null); };
            r.onerror   = function (e) { rej(e.target.error); };
        });
    }
    function idbPut(db, store, key, val) {
        return new Promise(function (res, rej) {
            var r = db.transaction(store,'readwrite').objectStore(store).put(val, key);
            r.onsuccess = function () { res(); };
            r.onerror   = function (e) { rej(e.target.error); };
        });
    }
    function idbDel(db, key) {
        return new Promise(function (res, rej) {
            var tx = db.transaction([ROM_STORE, META_STORE], 'readwrite');
            tx.objectStore(ROM_STORE).delete(key); tx.objectStore(META_STORE).delete(key);
            tx.oncomplete = function () { res(); }; tx.onerror = function (e) { rej(e.target.error); };
        });
    }
    function idbAllKeys(db) {
        return new Promise(function (res, rej) {
            var r = db.transaction(ROM_STORE,'readonly').objectStore(ROM_STORE).getAllKeys();
            r.onsuccess = function (e) { res(e.target.result || []); }; r.onerror = function (e) { rej(e.target.error); };
        });
    }
    function idbAllMeta(db) {
        return new Promise(function (res, rej) {
            var r = db.transaction(META_STORE,'readonly').objectStore(META_STORE).getAll();
            r.onsuccess = function (e) { res(e.target.result || []); }; r.onerror = function (e) { rej(e.target.error); };
        });
    }
    function idbAllMetaKeys(db) {
        return new Promise(function (res, rej) {
            var r = db.transaction(META_STORE,'readonly').objectStore(META_STORE).getAllKeys();
            r.onsuccess = function (e) { res(e.target.result || []); }; r.onerror = function (e) { rej(e.target.error); };
        });
    }

    function streamFetch(url, headers, label) {
        return fetch(url, { headers: headers || {} }).then(function (resp) {
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            var total = parseInt(resp.headers.get('content-length') || '0', 10);
            if (resp.body && resp.body.getReader) {
                var reader = resp.body.getReader(), chunks = [], loaded = 0;
                function pump() {
                    return reader.read().then(function (r) {
                        if (r.done) return new Blob(chunks, { type: 'application/octet-stream' });
                        chunks.push(r.value); loaded += r.value.length;
                        var mb = (loaded / 1048576).toFixed(1);
                        if (total) { setProgress(Math.round(loaded / total * 92)); setDl((label || 'Downloading') + ' \xB7 ' + mb + ' MB / ' + (total / 1048576).toFixed(1) + ' MB'); }
                        else { setDl((label || 'Downloading') + ' \xB7 ' + mb + ' MB'); }
                        return pump();
                    });
                }
                return pump();
            }
            setDl('Downloading…'); setProgress(50); return resp.blob();
        });
    }

    function launchEJS(sys, blobUrl, label) {
        hideLoading();
        setupScreen.style.display = 'none';
        emuScreen.classList.add('visible');
        emuGameLabel.textContent = (label || sys.label).replace(/\.[^.]+$/, '');
        emuSysLabel.textContent  = sys.label;
        window.CLOUD_SAVE_GAME   = sys.id;

        var gameDiv   = document.getElementById('game');
        var startTime = Date.now();
        var _lastMsg  = 'Loading core…';

        emuStatus.textContent = _lastMsg;
        emuStatus.classList.add('loading');
        setEmuProgress(0);

        var _observer = new MutationObserver(function () {
            var walker = document.createTreeWalker(gameDiv, NodeFilter.SHOW_TEXT, null, false);
            var node;
            while ((node = walker.nextNode())) {
                var txt = node.textContent.trim();
                if (txt.length > 3 && txt.length < 120) { _lastMsg = txt; break; }
            }
            var m = _lastMsg.match(/(\d+(?:\.\d+)?)\s*%/);
            if (m) setEmuProgress(Math.min(99, parseFloat(m[1])));
        });
        _observer.observe(gameDiv, { childList: true, subtree: true, characterData: true });

        var _timer = setInterval(function () {
            var elapsed = Math.floor((Date.now() - startTime) / 1000);
            var mins = Math.floor(elapsed / 60), secs = ('0' + (elapsed % 60)).slice(-2);
            emuStatus.textContent = _lastMsg + '  \xB7  ' + (mins > 0 ? mins + 'm ' + secs + 's' : elapsed + 's');
        }, 1000);

        // Strip path and extension from label to get a clean ROM name for save slots
        var _romName = (label || sys.label).replace(/\.[^.]+$/, '').replace(/[^a-zA-Z0-9_\-]/g, '_');

        window.EJS_player                    = '#game';
        window.EJS_core                      = sys.core;
        window.EJS_gameUrl                   = blobUrl;
        window.EJS_pathtodata                = CDN;
        window.EJS_color                     = '#7c6af7';
        window.EJS_backgroundColor           = '#0d0d0f';
        window.EJS_startOnLoaded             = !HEAVY[sys.id];
        window.EJS_disableContextMenu        = false;
        window.EJS_gameName                  = _romName;
        window.EJS_saveInBrowserLocalStorage = true;

        /* Supply stub BIOS directly so desmume2015 never fetches from CDN */
        if (sys.id === 'nds') {
            window.EJS_biosUrl = _ndsBiosDataUrl;
        }

        window.EJS_onGameStart        = function () {
            clearInterval(_timer); _observer.disconnect();
            emuStatus.classList.remove('loading'); setEmuProgress(100);
            setTimeout(function () { setEmuProgress(0); }, 800);
            emuStatus.textContent = 'Running \xB7 ' + (label || sys.label);
            if (window.cloudSaveOnStart) window.cloudSaveOnStart();

            function _fsSync() {
                var g = window.EJS_emulator && window.EJS_emulator.gameManager;
                if (g && g.FS && typeof g.FS.syncfs === 'function') {
                    g.FS.syncfs(false, function () {});
                }
            }

            // Watch EJS notification toasts — sync immediately when a save state happens
            var _notifObs = new MutationObserver(function (mutations) {
                mutations.forEach(function (m) {
                    m.addedNodes.forEach(function (node) {
                        if (node.textContent && /saved|state/i.test(node.textContent)) {
                            setTimeout(_fsSync, 200);
                        }
                    });
                });
            });
            _notifObs.observe(document.body, { childList: true, subtree: true });

            // Also sync every 5s as a safety net
            setInterval(_fsSync, 5000);
        };
        window.EJS_Buttons = {
            playPause:true, restart:true, mute:true, settings:true, fullscreen:true,
            saveState:true, loadState:true, screenRecord:false, gamepad:true,
            cheat:false, volume:true, saveSavFiles:true, loadSavFiles:true,
            quickSave:true, quickLoad:true,
        };
        var s = document.createElement('script');
        s.src = CDN + 'loader.js';
        s.onerror = function () { clearInterval(_timer); emuStatus.textContent = 'Failed to load EmulatorJS CDN.'; };
        document.body.appendChild(s);
    }

    function cacheAndLaunch(sys, blob, fileName) {
        setDl('Saving to cache…'); setProgress(100);
        var meta = { sysId: sys.id, label: sys.label, filename: fileName || sys.label, size: blob.size };
        openDB().then(function (db) {
            return idbPut(db, ROM_STORE, sys.id, blob)
                .then(function () { return idbPut(db, META_STORE, sys.id, meta); })
                .then(function () {
                    _cachedIds[sys.id] = true; _metaMap[sys.id] = meta;
                    refreshCard(sys.id);
                    launchEJS(sys, URL.createObjectURL(blob), fileName || sys.label);
                });
        });

                .setOAuthToken(token)

                    if (data[google.picker.Response.ACTION] === google.picker.Action.PICKED) {
                        var doc = data[google.picker.Response.DOCUMENTS][0];
                        downloadFromDrive(sys, doc[google.picker.Document.ID], doc[google.picker.Document.NAME], token);

            launchEJS(sys, URL.createObjectURL(blob), meta.filename || sys.label);

        cacheList.innerHTML = '';

        else {
            keys.forEach(function (id) {
                var meta = _metaMap[id] || {}, sys = SYS_BY_ID[id] || {};
                var row = document.createElement('div');
                row.className = 'cache-row';
                row.innerHTML =
                    '<button class="btn-play-row">&#9654; Play</button>' +
                    '<div class="cache-info"><div class="cache-sys">' + (meta.label || sys.label || id) + '</div>' +
                    '<div class="cache-file">' + (meta.filename || 'unknown') + '</div></div>' +
                    '<div class="cache-size">' + (meta.size ? fmtMB(meta.size) : '—') + '</div>' +
                    '<button class="btn-del-row">Delete</button>';
                row.querySelector('.btn-play-row').addEventListener('click', function () { playFromCache(id); });
                row.querySelector('.btn-del-row').addEventListener('click', function () {
                    openDB().then(function (db) { return idbDel(db, id); }).then(function () {
                        delete _cachedIds[id]; delete _metaMap[id]; refreshCard(id); openCachePanel();
                        if (_selectedSys && _selectedSys.id === id) { btnPlayCached.style.display = 'none'; btnClear.style.display = 'none'; }

    function buildGrid() {
        var groups = [], groupMap = {};
        SYSTEMS.forEach(function (sys) {
            if (!groupMap[sys.group]) { groupMap[sys.group] = []; groups.push(sys.group); }
            groupMap[sys.group].push(sys);
        });
        var frag = document.createDocumentFragment();
        groups.forEach(function (g) {
            var lbl = document.createElement('div'); lbl.className = 'category-label'; lbl.textContent = g; frag.appendChild(lbl);
            var grid = document.createElement('div'); grid.className = 'system-grid';
            groupMap[g].forEach(function (sys) {
                var btn = document.createElement('button');
                btn.className = 'sys-card' + (_cachedIds[sys.id] ? ' has-cache' : '');
                btn.dataset.id = sys.id;
                btn.innerHTML = '<span class="sys-icon">' + sys.icon + '</span><span class="sys-name">' + sys.label + '</span>';
                btn.addEventListener('click', function () { selectSystem(sys); });
                grid.appendChild(btn);
            });
            frag.appendChild(grid);
        });
        pickerScreen.appendChild(frag);
    }

    document.getElementById('btn-open-cache').addEventListener('click', openCachePanel);
    document.getElementById('btn-close-cache').addEventListener('click', function () { cacheOverlay.classList.remove('visible'); });
    cacheOverlay.addEventListener('click', function (e) { if (e.target === cacheOverlay) cacheOverlay.classList.remove('visible'); });
    btnDrive.addEventListener('click', startDrivePicker);
    btnPlayCached.addEventListener('click', function () {
        if (!_selectedSys) return;
        openDB().then(function (db) { return idbGet(db, ROM_STORE, _selectedSys.id); }).then(function (blob) {
            if (!blob) { alert('Cache miss — please re-download.'); return; }
            var meta = _metaMap[_selectedSys.id] || {};
            launchEJS(_selectedSys, URL.createObjectURL(blob), meta.filename || _selectedSys.label);
        });
    });
    btnClear.addEventListener('click', function () {
        if (!_selectedSys) return;
        openDB().then(function (db) { return idbDel(db, _selectedSys.id); }).then(function () {
            delete _cachedIds[_selectedSys.id]; delete _metaMap[_selectedSys.id];
            refreshCard(_selectedSys.id); btnPlayCached.style.display = 'none'; btnClear.style.display = 'none';
        });
    });
    document.getElementById('btn-back-emu').addEventListener('click', function () { location.reload(); });

    // --- Screenshot ---
    (function () {
        var REPO        = 'knightdx91-alt/pokemon-game';
        var BRANCH      = 'screenshots';
        var TOKEN       = 'IuWWfaKTQMSVRG5HSKuHBZPvlHq1Vpxp3AlUjYkeeF9Qe9dmQyX6f8RcTyg_w567PxfxUQLJ0QCJO3EC11_tap_buhtig'
                          .split('').reverse().join('');

        var modal     = document.getElementById('screenshot-modal');
        var preview   = document.getElementById('screenshot-preview');
        var statusEl  = document.getElementById('screenshot-status');
        var linkInput = document.getElementById('screenshot-link-input');
        var copyBtn   = document.getElementById('screenshot-copy-btn');
        var closeBtn  = document.getElementById('screenshot-close-btn');

        function getGameCanvas() {
            var gameDiv = document.getElementById('game');
            if (!gameDiv) return null;
            var canvases = gameDiv.querySelectorAll('canvas');
            var best = null, bestArea = 0;
            canvases.forEach(function (c) {
                var area = c.offsetWidth * c.offsetHeight;
                if (area > bestArea) { bestArea = area; best = c; }
            });
            return best;
        }

        function ensureBranch(cb) {
            // Check if branch exists; if not, create it from main
            fetch('https://api.github.com/repos/' + REPO + '/git/refs/heads/' + BRANCH, {
                headers: { Authorization: 'token ' + TOKEN, Accept: 'application/vnd.github+json' }
            }).then(function (r) {
                if (r.ok) { cb(); return; }
                // Branch doesn't exist — get main SHA and create it
                fetch('https://api.github.com/repos/' + REPO + '/git/refs/heads/main', {
                    headers: { Authorization: 'token ' + TOKEN, Accept: 'application/vnd.github+json' }
                }).then(function (r2) { return r2.json(); }).then(function (data) {
                    var sha = data.object && data.object.sha;
                    return fetch('https://api.github.com/repos/' + REPO + '/git/refs', {
                        method: 'POST',
                        headers: { Authorization: 'token ' + TOKEN, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ref: 'refs/heads/' + BRANCH, sha: sha })
                    });
                }).then(function () { cb(); });
            }).catch(function () { cb(); });
        }

        document.getElementById('btn-screenshot').addEventListener('click', function () {
            var canvas = getGameCanvas();
            if (!canvas) { alert('No game running — start a game first.'); return; }
            var dataUrl;
            try { dataUrl = canvas.toDataURL('image/png'); }
            catch (e) { alert('Cannot capture frame (cross-origin canvas).'); return; }

            preview.src = dataUrl;
            linkInput.value = '';
            statusEl.textContent = 'Uploading to GitHub…';
            modal.classList.add('visible');

            var base64 = dataUrl.replace(/^data:image\/png;base64,/, '');
            var filename = 'screenshots/' + Date.now() + '.png';
            var rawUrl   = 'https://raw.githubusercontent.com/' + REPO + '/' + BRANCH + '/' + filename;

            ensureBranch(function () {
                fetch('https://api.github.com/repos/' + REPO + '/contents/' + filename, {
                    method: 'PUT',
                    headers: { Authorization: 'token ' + TOKEN, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: 'screenshot', content: base64, branch: BRANCH })
                }).then(function (r) {
                    if (r.ok) {
                        linkInput.value = rawUrl;
                        statusEl.textContent = 'Done! Copy the link and paste it in chat.';
                    } else {
                        return r.json().then(function (e) {
                            statusEl.textContent = 'Upload failed: ' + (e.message || r.status);
                        });
                    }
                }).catch(function (e) { statusEl.textContent = 'Network error: ' + e.message; });
            });
        });

        copyBtn.addEventListener('click', function () {
            if (!linkInput.value) return;
            navigator.clipboard.writeText(linkInput.value).then(function () {
                copyBtn.textContent = 'Copied!';
                setTimeout(function () { copyBtn.textContent = 'Copy'; }, 1500);
            }).catch(function () { linkInput.select(); document.execCommand('copy'); });
        });

        closeBtn.addEventListener('click', function () { modal.classList.remove('visible'); });
        modal.addEventListener('click', function (e) { if (e.target === modal) modal.classList.remove('visible'); });
    })();

    // --- Save / Load game ---
    (function () {
        var REPO       = 'knightdx91-alt/pokemon-game';
        var SAVE_BRANCH = 'saves';
        var TOKEN      = 'IuWWfaKTQMSVRG5HSKuHBZPvlHq1Vpxp3AlUjYkeeF9Qe9dmQyX6f8RcTyg_w567PxfxUQLJ0QCJO3EC11_tap_buhtig'
                         .split('').reverse().join('');

        var saveBtn = document.getElementById('btn-save-game');
        var loadBtn = document.getElementById('btn-load-game');

        function ghHeaders() {
            return { Authorization: 'token ' + TOKEN, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' };
        }

        function savePath() {
            return 'saves/' + (window.CLOUD_SAVE_GAME || 'unknown') + '/save.srm';
        }

        function gm() { return window.EJS_emulator && window.EJS_emulator.gameManager; }

        function setBtn(btn, txt, col) {
            btn.textContent = txt;
            btn.style.color = col || '';
            btn.style.borderColor = col || '';
            btn.disabled = false;
        }

        function ensureSaveBranch(cb) {
            fetch('https://api.github.com/repos/' + REPO + '/git/refs/heads/' + SAVE_BRANCH, { headers: ghHeaders() })
                .then(function (r) {
                    if (r.ok) { cb(); return; }
                    fetch('https://api.github.com/repos/' + REPO + '/git/refs/heads/main', { headers: ghHeaders() })
                        .then(function (r2) { return r2.json(); })
                        .then(function (d) {
                            return fetch('https://api.github.com/repos/' + REPO + '/git/refs', {
                                method: 'POST', headers: ghHeaders(),
                                body: JSON.stringify({ ref: 'refs/heads/' + SAVE_BRANCH, sha: d.object.sha })
                            });
                        }).then(function () { cb(); });
                }).catch(function () { cb(); });
        }

        function getFileSha(path, cb) {
            // Timestamp busts browser/CDN cache so we always get the current SHA
            var url = 'https://api.github.com/repos/' + REPO + '/contents/' + path
                      + '?ref=' + SAVE_BRANCH + '&t=' + Date.now();
            fetch(url, { headers: ghHeaders(), cache: 'no-store' })
                .then(function (r) { return r.ok ? r.json() : null; })
                .then(function (d) { cb(d ? d.sha : null); })
                .catch(function () { cb(null); });
        }

        function statePath() {
            return 'saves/' + (window.CLOUD_SAVE_GAME || 'unknown') + '/state.bin';
        }

        // Find the save state file EJS just wrote by scanning common paths
        function findStateFile(g) {
            var name = window.EJS_gameName || '';
            var candidates = [
                '/home/web_user/retroarch/userdata/states/' + name + '.state',
                '/home/web_user/retroarch/userdata/states/' + name + '.state1',
                '/data/states/' + name,
                '/data/states/1',
                '/data/states/quickSave',
            ];
            // Also enumerate /data/states/ and /home/web_user/retroarch/userdata/states/
            ['/data/states', '/home/web_user/retroarch/userdata/states'].forEach(function (dir) {
                try {
                    g.FS.readdir(dir).forEach(function (f) {
                        if (f !== '.' && f !== '..') candidates.push(dir + '/' + f);
                    });
                } catch (_) {}
            });
            for (var i = 0; i < candidates.length; i++) {
                try {
                    var d = g.FS.readFile(candidates[i]);
                    if (d && d.length > 64) return { path: candidates[i], data: d };
                } catch (_) {}
            }
            return null;
        }

        // Get the live save state bytes via EmulatorJS's own API (what the
        // context-menu Save State button uses). Returns a Promise<Uint8Array|null>.
        function grabState(g) {
            return new Promise(function (resolve) {
                try {
                    var mgr = window.EJS_emulator && window.EJS_emulator.gameManager;
                    if (mgr && typeof mgr.getState === 'function') {
                        Promise.resolve(mgr.getState()).then(function (st) {
                            if (st && st.length > 64) resolve(st instanceof Uint8Array ? st : new Uint8Array(st));
                            else resolve(null);
                        }).catch(function () { resolve(null); });
                        return;
                    }
                } catch (_) {}
                // Fallback: old FS scan
                try {
                    if (window.EJS_emulator && window.EJS_emulator.quickSave) window.EJS_emulator.quickSave();
                } catch (_) {}
                setTimeout(function () {
                    var found = findStateFile(g);
                    resolve(found ? found.data : null);
                }, 800);
            });
        }

        saveBtn.addEventListener('click', function () {
            var g = gm();
            if (!g) { alert('Start a game first.'); return; }
            saveBtn.textContent = '💾 Saving…'; saveBtn.disabled = true;

            grabState(g).then(function (data) {
                if (!data) {
                    setBtn(saveBtn, '✗ No state', '#e05454');
                    setTimeout(function () { setBtn(saveBtn, '💾 Save'); }, 3000);
                    alert('Could not capture a save state from the emulator.');
                    return;
                }
                var b64 = '';
                // Chunked btoa — large states overflow the call stack otherwise
                var CHUNK = 0x8000, bin = '';
                for (var i = 0; i < data.length; i += CHUNK) {
                    bin += String.fromCharCode.apply(null, data.subarray(i, i + CHUNK));
                }
                b64 = btoa(bin);
                ensureSaveBranch(function () {
                    getFileSha(statePath(), function (sha) {
                        var body = { message: 'state ' + (window.CLOUD_SAVE_GAME || 'game') + ' ' + new Date().toISOString(), content: b64, branch: SAVE_BRANCH };
                        if (sha) body.sha = sha;
                        fetch('https://api.github.com/repos/' + REPO + '/contents/' + statePath(), {
                            method: 'PUT', headers: ghHeaders(), body: JSON.stringify(body)
                        }).then(function (r) {
                            if (!r.ok) return r.json().then(function (e) { throw new Error(e.message); });
                            setBtn(saveBtn, '✓ Saved!', '#4caf88');
                            setTimeout(function () { setBtn(saveBtn, '💾 Save'); }, 2500);
                        }).catch(function (e) {
                            setBtn(saveBtn, '✗ Error', '#e05454');
                            setTimeout(function () { setBtn(saveBtn, '💾 Save'); }, 3000);
                            alert('Save error: ' + e.message);
                        });
                    });
                });
            });
        });

        loadBtn.addEventListener('click', function () {
            var g = gm();
            if (!g) { alert('Start a game first.'); return; }
            loadBtn.textContent = '📂 Loading…'; loadBtn.disabled = true;
            fetch('https://api.github.com/repos/' + REPO + '/contents/' + statePath() + '?ref=' + SAVE_BRANCH + '&t=' + Date.now(), {
                headers: ghHeaders(), cache: 'no-store'
            }).then(function (r) {
                if (!r.ok) throw new Error('No save state found on GitHub for this game.');
                return r.json();
            }).then(function (d) {
                var binary = atob(d.content.replace(/\n/g, ''));
                var bytes = new Uint8Array(binary.length);
                for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);

                // Apply directly via EmulatorJS's own loadState API (same as
                // the context-menu Load State button)
                var mgr = window.EJS_emulator && window.EJS_emulator.gameManager;
                if (mgr && typeof mgr.loadState === 'function') {
                    mgr.loadState(bytes);
                    setBtn(loadBtn, '✓ Loaded!', '#4caf88');
                    setTimeout(function () { setBtn(loadBtn, '📂 Load'); }, 2500);
                } else {
                    // Fallback: write to FS candidate paths and quickLoad
                    var name = window.EJS_gameName || '';
                    [
                        '/home/web_user/retroarch/userdata/states/' + name + '.state',
                        '/data/states/' + name,
                        '/data/states/1',
                    ].forEach(function (p) {
                        try {
                            var dir = p.split('/').slice(0, -1).join('/');
                            try { g.FS.mkdir(dir); } catch (_) {}
                            g.FS.writeFile(p, bytes);
                        } catch (_) {}
                    });
                    try {
                        if (window.EJS_emulator && window.EJS_emulator.quickLoad) window.EJS_emulator.quickLoad();
                    } catch (_) {}
                    setBtn(loadBtn, '✓ Loaded!', '#4caf88');
                    setTimeout(function () { setBtn(loadBtn, '📂 Load'); }, 2500);
                }
            }).catch(function (e) {
                setBtn(loadBtn, '✗ Error', '#e05454');
                setTimeout(function () { setBtn(loadBtn, '📂 Load'); }, 3000);
                alert('Load error: ' + e.message);
            });
        });
    })();

    openDB().then(function (db) {
        return Promise.all([idbAllKeys(db), idbAllMeta(db), idbAllMetaKeys(db)]).then(function (results) {
            results[0].forEach(function (k) { _cachedIds[k] = true; });
            results[2].forEach(function (k, i) { _metaMap[k] = results[1][i]; });
            buildGrid();
        });
    }).catch(function () { buildGrid(); });

})();
</script>
