<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Book Reader</title>
<style>
    :root {
        --bg: #0d0d0f; --panel: #16161a; --panel2: #1e1e26; --border: #2a2a35;
        --text: #e8e8f0; --muted: #6a6a7a; --accent: #7c6af7; --success: #4caf88; --danger: #e05454;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
        background: var(--bg); color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        display: flex; flex-direction: column; min-height: 100vh;
    }
    a { color: var(--accent); text-decoration: none; }

    /* Top bar */
    .topbar {
        display: flex; align-items: center; gap: 12px;
        padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--panel);
    }
    .topbar .home { font-size: 18px; }
    .topbar .title { font-size: 15px; font-weight: 700; flex: 1; }
    .topbar .title small { color: var(--muted); font-weight: 400; letter-spacing: 2px; text-transform: uppercase; font-size: 9px; display: block; }

    /* Library screen */
    #library { padding: 16px; max-width: 720px; margin: 0 auto; width: 100%; }
    .add-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
    .add-row input[type=url] {
        flex: 1; min-width: 180px; background: var(--panel2); border: 1px solid var(--border);
        color: var(--text); border-radius: 10px; padding: 10px 12px; font-size: 13px;
    }
    .add-row input::placeholder { color: var(--muted); }
    button.btn {
        background: var(--panel2); border: 1px solid var(--border); color: var(--text);
        border-radius: 10px; padding: 10px 14px; font-size: 13px; cursor: pointer; font-weight: 600;
        touch-action: manipulation; white-space: nowrap;
    }
    button.btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    button.btn:disabled { opacity: 0.45; cursor: not-allowed; }
    button.btn.primary { border-color: var(--accent); color: var(--accent); }
    button.btn.danger:hover { border-color: var(--danger); color: var(--danger); }
    .hint { font-size: 11px; color: var(--muted); line-height: 1.6; margin-bottom: 18px; }

    .shelf { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
    .book {
        background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
        padding: 14px; cursor: pointer; transition: border-color .15s, background .15s; position: relative;
    }
    .book:hover { border-color: var(--accent); background: var(--panel2); }
    .book .cover {
        height: 80px; border-radius: 8px; background: var(--panel2); display: flex;
        align-items: center; justify-content: center; font-size: 30px; margin-bottom: 10px;
    }
    .book .bt { font-size: 13px; font-weight: 600; line-height: 1.3; word-break: break-word; }
    .book .bs { font-size: 10px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }
    .book .prog { height: 3px; border-radius: 2px; background: var(--border); margin-top: 8px; overflow: hidden; }
    .book .prog > i { display: block; height: 100%; background: var(--accent); width: 0; }
    .book .del {
        position: absolute; top: 6px; right: 6px; width: 22px; height: 22px; border-radius: 6px;
        background: rgba(0,0,0,.4); border: none; color: var(--muted); font-size: 13px; cursor: pointer; display: none;
    }
    .book:hover .del { display: block; }
    .book .del:hover { color: var(--danger); }
    .empty { color: var(--muted); font-size: 13px; text-align: center; padding: 40px 0; }

    /* Reader screen */
    #reader { display: none; flex: 1; flex-direction: column; min-height: 0; }
    #reader.visible { display: flex; }
    .reader-bar {
        display: flex; align-items: center; gap: 10px; padding: 8px 12px;
        border-bottom: 1px solid var(--border); background: var(--panel); flex-shrink: 0;
    }
    .reader-bar .rt { flex: 1; font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .reader-bar .pos { font-size: 12px; color: var(--muted); min-width: 64px; text-align: center; }
    .reader-bar button { background: none; border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 6px 10px; cursor: pointer; font-size: 14px; }
    .reader-bar button:hover { border-color: var(--accent); color: var(--accent); }
    #viewer { flex: 1; min-height: 0; overflow: auto; background: #fff; position: relative; }
    #viewer.dark { background: #15151a; }
    #viewer .txt { padding: 24px; max-width: 720px; margin: 0 auto; line-height: 1.7; font-size: 17px; color: #15151a; white-space: pre-wrap; word-wrap: break-word; }
    #viewer.dark .txt { color: #e8e8f0; }
    #viewer .cbz-img, #viewer canvas { display: block; margin: 0 auto; max-width: 100%; }
    .nav-zone { position: absolute; top: 0; bottom: 0; width: 22%; z-index: 5; }
    .nav-zone.left { left: 0; } .nav-zone.right { right: 0; }

    /* Loading overlay */
    #overlay {
        position: fixed; inset: 0; background: rgba(13,13,15,.92); display: none;
        align-items: center; justify-content: center; flex-direction: column; gap: 14px; z-index: 50; padding: 20px; text-align: center;
    }
    #overlay.visible { display: flex; }
    .spinner { width: 38px; height: 38px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #overlay .msg { font-size: 13px; color: var(--muted); }
</style>
</head>
<body>

<div class="topbar">
    <a class="home" href="index.html" title="Home">🏠</a>
    <div class="title">Book Reader<small>EPUB · PDF · CBZ · TXT</small></div>
    <button class="btn" id="btn-theme" title="Toggle reading theme">🌙</button>
</div>

<!-- Library -->
<div id="library">
    <div class="add-row">
        <button class="btn primary" id="btn-file">📂 Add file</button>
        <input type="file" id="file-input" accept=".epub,.pdf,.cbz,.zip,.txt,.md,.text" style="display:none" multiple>
        <input type="url" id="url-input" placeholder="…or paste a direct book URL">
        <button class="btn" id="btn-url" disabled>Load</button>
        <button class="btn" id="btn-drive-save" disabled title="Save the URL's file to Google Drive">💾 Drive</button>
    </div>
    <div class="hint">
        Supported: <b>EPUB</b>, <b>PDF</b>, <b>CBZ</b> (comics), <b>TXT/MD</b>. Books are cached on this
        device (IndexedDB) and open offline. Your reading position is remembered per book.
        Google Drive: Share → copy link, paste as-is.
    </div>
    <div class="shelf" id="shelf"></div>
    <div class="empty" id="empty" style="display:none">No books yet. Add a file or paste a URL above.</div>
</div>

<!-- Reader -->
<div id="reader">
    <div class="reader-bar">
        <button id="r-back" title="Back to library">‹ Library</button>
        <div class="rt" id="r-title"></div>
        <button id="r-prev" title="Previous">◀</button>
        <div class="pos" id="r-pos"></div>
        <button id="r-next" title="Next">▶</button>
    </div>
    <div id="viewer"></div>
</div>

<div id="overlay"><div class="spinner"></div><div class="msg" id="overlay-msg">Loading…</div></div>

<script src="https://cdn.jsdelivr.net/npm/fflate@0.8.2/umd/index.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<script>
(function () {
    'use strict';

    // ---- Google Drive (reused OAuth client from the emulator page) ----
    var CLIENT_ID = '74660999441-3tu0u98phuckm7avp4kh6rnohpo84l1f.apps.googleusercontent.com';
    var DRIVE_RW  = 'https://www.googleapis.com/auth/drive.file';

    if (window.pdfjsLib) {
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
    }

    // ---- IndexedDB (mirrors the emulator's cache approach) ----
    var DB = 'reader-books-v1', BOOKS = 'books', META = 'meta', PROG = 'progress';
    function openDB() {
        return new Promise(function (res, rej) {
            var r = indexedDB.open(DB, 1);
            r.onupgradeneeded = function (e) {
                var db = e.target.result;
                if (!db.objectStoreNames.contains(BOOKS)) db.createObjectStore(BOOKS);
                if (!db.objectStoreNames.contains(META))  db.createObjectStore(META);
                if (!db.objectStoreNames.contains(PROG))  db.createObjectStore(PROG);
            };
            r.onsuccess = function (e) { res(e.target.result); };
            r.onerror   = function (e) { rej(e.target.error); };
        });
    }
    function idbGet(db, store, key) {
        return new Promise(function (res, rej) {
            var t = db.transaction(store, 'readonly').objectStore(store).get(key);
            t.onsuccess = function () { res(t.result); }; t.onerror = function () { rej(t.error); };
        });
    }
    function idbPut(db, store, key, val) {
        return new Promise(function (res, rej) {
            var t = db.transaction(store, 'readwrite').objectStore(store).put(val, key);
            t.onsuccess = function () { res(); }; t.onerror = function () { rej(t.error); };
        });
    }
    function idbDel(db, store, key) {
        return new Promise(function (res, rej) {
            var t = db.transaction(store, 'readwrite').objectStore(store).delete(key);
            t.onsuccess = function () { res(); }; t.onerror = function () { rej(t.error); };
        });
    }
    function idbAll(db, store) {
        return new Promise(function (res, rej) {
            var out = [], cur = db.transaction(store, 'readonly').objectStore(store).openCursor();
            cur.onsuccess = function (e) {
                var c = e.target.result;
                if (c) { out.push({ key: c.key, val: c.value }); c.continue(); } else res(out);
            };
            cur.onerror = function () { rej(cur.error); };
        });
    }

    // ---- DOM ----
    var $ = function (id) { return document.getElementById(id); };
    var library = $('library'), reader = $('reader'), viewer = $('viewer');
    var shelf = $('shelf'), empty = $('empty');
    var urlInput = $('url-input'), btnUrl = $('btn-url'), btnFile = $('btn-file'), fileInput = $('file-input');
    var btnDriveSave = $('btn-drive-save');
    var overlay = $('overlay'), overlayMsg = $('overlay-msg');
    var rTitle = $('r-title'), rPos = $('r-pos'), rPrev = $('r-prev'), rNext = $('r-next'), rBack = $('r-back');

    function showOverlay(msg) { overlayMsg.textContent = msg || 'Loading…'; overlay.classList.add('visible'); }
    function hideOverlay() { overlay.classList.remove('visible'); }

    // ---- Format detection ----
    function extOf(name) { var m = String(name || '').toLowerCase().match(/\.([a-z0-9]+)$/); return m ? m[1] : ''; }
    function detectFormat(name, bytes) {
        var ext = extOf(name);
        if (ext === 'epub') return 'epub';
        if (ext === 'pdf')  return 'pdf';
        if (ext === 'cbz')  return 'cbz';
        if (ext === 'txt' || ext === 'md' || ext === 'text') return 'txt';
        // Sniff by magic bytes when extension is missing/ambiguous (e.g. .zip)
        if (bytes && bytes.length > 4) {
            if (bytes[0] === 0x25 && bytes[1] === 0x50 && bytes[2] === 0x44 && bytes[3] === 0x46) return 'pdf'; // %PDF
            if (bytes[0] === 0x50 && bytes[1] === 0x4B) {
                // ZIP container: EPUB has "mimetype" = application/epub+zip; else treat as comic
                try {
                    var head = new TextDecoder().decode(bytes.slice(0, 200));
                    if (head.indexOf('application/epub+zip') !== -1) return 'epub';
                } catch (_) {}
                return 'cbz';
            }
        }
        return 'txt';
    }
    function fmtIcon(f) { return { epub: '📖', pdf: '📄', cbz: '🖼️', txt: '📝' }[f] || '📚'; }
    function fmtMB(n) { return n < 1048576 ? Math.round(n / 1024) + ' KB' : (n / 1048576).toFixed(1) + ' MB'; }

    // ---- Add a book (from a Blob/File) ----
    function bookKey(name) { return name.replace(/[^a-zA-Z0-9_\-.]/g, '_') + '::' + Date.now().toString(36); }

    function addBook(name, blob) {
        return blob.arrayBuffer().then(function (buf) {
            var bytes = new Uint8Array(buf);
            var format = detectFormat(name, bytes);
            var key = bookKey(name);
            var meta = { title: cleanTitle(name), format: format, size: blob.size, added: Date.now(), filename: name };
            return openDB().then(function (db) {
                return idbPut(db, BOOKS, key, blob)
                    .then(function () { return idbPut(db, META, key, meta); })
                    .then(function () { return { key: key, meta: meta }; });
            });
        });
    }
    function cleanTitle(name) { return String(name || 'Book').replace(/\.[^.]+$/, '').replace(/[_]+/g, ' ').trim() || 'Book'; }

    // ---- Library rendering ----
    function refreshLibrary() {
        return openDB().then(function (db) { return idbAll(db, META); }).then(function (rows) {
            rows.sort(function (a, b) { return (b.val.added || 0) - (a.val.added || 0); });
            shelf.innerHTML = '';
            empty.style.display = rows.length ? 'none' : 'block';
            rows.forEach(function (r) {
                var meta = r.val, key = r.key;
                var card = document.createElement('div');
                card.className = 'book';
                card.innerHTML =
                    '<button class="del" title="Delete">✕</button>' +
                    '<div class="cover">' + fmtIcon(meta.format) + '</div>' +
                    '<div class="bt"></div>' +
                    '<div class="bs">' + meta.format + ' · ' + fmtMB(meta.size || 0) + '</div>' +
                    '<div class="prog"><i></i></div>';
                card.querySelector('.bt').textContent = meta.title;
                card.addEventListener('click', function () { openBook(key, meta); });
                card.querySelector('.del').addEventListener('click', function (e) {
                    e.stopPropagation();
                    if (!confirm('Delete "' + meta.title + '" from this device?')) return;
                    openDB().then(function (db) {
                        return Promise.all([idbDel(db, BOOKS, key), idbDel(db, META, key), idbDel(db, PROG, key)]);
                    }).then(refreshLibrary);
                });
                shelf.appendChild(card);
                // progress bar
                openDB().then(function (db) { return idbGet(db, PROG, key); }).then(function (p) {
                    if (p && typeof p.pct === 'number') card.querySelector('.prog > i').style.width = Math.round(p.pct * 100) + '%';
                });
            });
        });
    }

    // ---- Progress helpers ----
    function saveProgress(key, data) { openDB().then(function (db) { idbPut(db, PROG, key, data); }); }
    function getProgress(key) { return openDB().then(function (db) { return idbGet(db, PROG, key); }); }

    // ================= Readers =================
    var current = null;   // { key, meta, teardown, prev, next }

    function showReader(meta) {
        library.style.display = 'none';
        reader.classList.add('visible');
        rTitle.textContent = meta.title;
        viewer.innerHTML = '';
        rPos.textContent = '';
    }
    function closeReader() {
        if (current && current.teardown) { try { current.teardown(); } catch (_) {} }
        current = null;
        reader.classList.remove('visible');
        library.style.display = '';
        refreshLibrary();
    }

    function openBook(key, meta) {
        showOverlay('Opening…');
        openDB().then(function (db) { return idbGet(db, BOOKS, key); }).then(function (blob) {
            if (!blob) { hideOverlay(); alert('Book data missing — please re-add it.'); return; }
            return getProgress(key).then(function (prog) {
                showReader(meta);
                var done = function () { hideOverlay(); };
                if (meta.format === 'epub')      return openEpub(key, blob, prog).then(done);
                if (meta.format === 'pdf')       return openPdf(key, blob, prog).then(done);
                if (meta.format === 'cbz')       return openCbz(key, blob, prog).then(done);
                return openTxt(key, blob, prog, meta).then(done);
            });
        }).catch(function (e) { hideOverlay(); alert('Could not open book: ' + e.message); });
    }

    // ---- EPUB (epub.js) ----
    function openEpub(key, blob, prog) {
        return blob.arrayBuffer().then(function (buf) {
            if (typeof ePub === 'undefined') throw new Error('EPUB engine not loaded');
            viewer.classList.remove('dark');
            var book = ePub(buf);
            var rendition = book.renderTo('viewer', { width: '100%', height: '100%', flow: 'paginated', spread: 'none' });
            var startCfi = prog && prog.cfi ? prog.cfi : undefined;
            rendition.display(startCfi);
            rendition.on('relocated', function (loc) {
                var pct = (loc && loc.start && typeof loc.start.percentage === 'number') ? loc.start.percentage : 0;
                rPos.textContent = Math.round(pct * 100) + '%';
                saveProgress(key, { type: 'epub', cfi: loc.start.cfi, pct: pct });
            });
            current = {
                key: key, teardown: function () { try { book.destroy(); } catch (_) {} },
                prev: function () { rendition.prev(); }, next: function () { rendition.next(); }
            };
            // arrow-key support
            rendition.on('keyup', onKey);
        });
    }

    // ---- PDF (pdf.js) ----
    function openPdf(key, blob, prog) {
        return blob.arrayBuffer().then(function (buf) {
            if (typeof pdfjsLib === 'undefined') throw new Error('PDF engine not loaded');
            viewer.classList.remove('dark');
            return pdfjsLib.getDocument({ data: buf }).promise.then(function (pdf) {
                var pageNum = (prog && prog.page) ? Math.min(prog.page, pdf.numPages) : 1;
                var canvas = document.createElement('canvas');
                viewer.innerHTML = ''; viewer.appendChild(canvas);
                var ctx = canvas.getContext('2d');
                var rendering = false, pending = null;
                function render(n) {
                    if (rendering) { pending = n; return; }
                    rendering = true;
                    pdf.getPage(n).then(function (page) {
                        var avail = viewer.clientWidth || 800;
                        var base = page.getViewport({ scale: 1 });
                        var scale = Math.max(0.5, Math.min(3, avail / base.width));
                        var vp = page.getViewport({ scale: scale * (window.devicePixelRatio || 1) });
                        canvas.width = vp.width; canvas.height = vp.height;
                        canvas.style.width = (vp.width / (window.devicePixelRatio || 1)) + 'px';
                        return page.render({ canvasContext: ctx, viewport: vp }).promise;
                    }).then(function () {
                        rendering = false;
                        rPos.textContent = n + ' / ' + pdf.numPages;
                        saveProgress(key, { type: 'pdf', page: n, pct: n / pdf.numPages });
                        if (pending !== null) { var p = pending; pending = null; render(p); }
                    });
                }
                render(pageNum);
                current = {
                    key: key, teardown: function () { try { pdf.destroy(); } catch (_) {} },
                    prev: function () { if (pageNum > 1) render(--pageNum); },
                    next: function () { if (pageNum < pdf.numPages) render(++pageNum); }
                };
            });
        });
    }

    // ---- CBZ (comic: zip of images) ----
    function openCbz(key, blob, prog) {
        return blob.arrayBuffer().then(function (buf) {
            if (typeof fflate === 'undefined') throw new Error('Unzip engine not loaded');
            return new Promise(function (resolve, reject) {
                fflate.unzip(new Uint8Array(buf), function (err, files) {
                    if (err) { reject(err); return; }
                    var names = Object.keys(files).filter(function (n) {
                        return /\.(jpe?g|png|gif|webp|bmp)$/i.test(n);
                    }).sort();
                    if (!names.length) { reject(new Error('No images found in archive')); return; }
                    var urls = names.map(function (n) {
                        return URL.createObjectURL(new Blob([files[n]]));
                    });
                    var idx = (prog && typeof prog.index === 'number') ? Math.min(prog.index, urls.length - 1) : 0;
                    var img = document.createElement('img');
                    img.className = 'cbz-img';
                    viewer.innerHTML = ''; viewer.appendChild(img);
                    function show(i) {
                        idx = Math.max(0, Math.min(urls.length - 1, i));
                        img.src = urls[idx];
                        viewer.scrollTop = 0;
                        rPos.textContent = (idx + 1) + ' / ' + urls.length;
                        saveProgress(key, { type: 'cbz', index: idx, pct: (idx + 1) / urls.length });
                    }
                    show(idx);
                    current = {
                        key: key,
                        teardown: function () { urls.forEach(function (u) { URL.revokeObjectURL(u); }); },
                        prev: function () { show(idx - 1); }, next: function () { show(idx + 1); }
                    };
                    resolve();
                });
            });
        });
    }

    // ---- TXT / Markdown ----
    function openTxt(key, blob, prog, meta) {
        return blob.text().then(function (text) {
            var wrap = document.createElement('div');
            wrap.className = 'txt';
            if (extOf(meta && meta.filename) === 'md') {
                wrap.innerHTML = renderMarkdown(text);
            } else {
                wrap.textContent = text;
            }
            viewer.innerHTML = ''; viewer.appendChild(wrap);
            // restore scroll
            if (prog && typeof prog.pct === 'number') {
                requestAnimationFrame(function () { viewer.scrollTop = prog.pct * (viewer.scrollHeight - viewer.clientHeight); });
            }
            var saveT = null;
            viewer.onscroll = function () {
                if (saveT) clearTimeout(saveT);
                saveT = setTimeout(function () {
                    var max = viewer.scrollHeight - viewer.clientHeight;
                    var pct = max > 0 ? viewer.scrollTop / max : 0;
                    rPos.textContent = Math.round(pct * 100) + '%';
                    saveProgress(key, { type: 'txt', pct: pct });
                }, 250);
            };
            current = {
                key: key, teardown: function () { viewer.onscroll = null; },
                prev: function () { viewer.scrollBy({ top: -viewer.clientHeight * 0.9, behavior: 'smooth' }); },
                next: function () { viewer.scrollBy({ top: viewer.clientHeight * 0.9, behavior: 'smooth' }); }
            };
        });
    }
    // Minimal, safe-ish markdown (headings, bold, italic, code, links, paragraphs)
    function renderMarkdown(src) {
        var esc = function (s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); };
        var out = esc(src)
            .replace(/^######\s?(.*)$/gm, '<h6>$1</h6>')
            .replace(/^#####\s?(.*)$/gm, '<h5>$1</h5>')
            .replace(/^####\s?(.*)$/gm, '<h4>$1</h4>')
            .replace(/^###\s?(.*)$/gm, '<h3>$1</h3>')
            .replace(/^##\s?(.*)$/gm, '<h2>$1</h2>')
            .replace(/^#\s?(.*)$/gm, '<h1>$1</h1>')
            .replace(/`([^`]+)`/g, '<code>$1</code>')
            .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
            .replace(/\*([^*]+)\*/g, '<em>$1</em>')
            .replace(/\[([^\]]+)\]\((https?:[^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
            .replace(/\n{2,}/g, '</p><p>');
        return '<p>' + out + '</p>';
    }

    // ---- Reader nav wiring ----
    function onKey(e) {
        if (e.key === 'ArrowLeft') { if (current && current.prev) current.prev(); }
        else if (e.key === 'ArrowRight') { if (current && current.next) current.next(); }
    }
    document.addEventListener('keyup', onKey);
    rPrev.addEventListener('click', function () { if (current && current.prev) current.prev(); });
    rNext.addEventListener('click', function () { if (current && current.next) current.next(); });
    rBack.addEventListener('click', closeReader);
    // edge tap zones for paged formats
    viewer.addEventListener('click', function (e) {
        if (!current || !current.prev) return;
        var x = e.clientX, w = viewer.clientWidth;
        if (x < w * 0.25) current.prev();
        else if (x > w * 0.75) current.next();
    });

    // ---- Theme toggle (applies to text/epub readers) ----
    $('btn-theme').addEventListener('click', function () {
        viewer.classList.toggle('dark');
        this.textContent = viewer.classList.contains('dark') ? '☀️' : '🌙';
    });

    // ---- Add via file input ----
    btnFile.addEventListener('click', function () { fileInput.click(); });
    fileInput.addEventListener('change', function () {
        var files = Array.prototype.slice.call(fileInput.files || []);
        if (!files.length) return;
        showOverlay('Adding ' + files.length + ' book(s)…');
        files.reduce(function (p, f) {
            return p.then(function () { return addBook(f.name, f); });
        }, Promise.resolve()).then(function () {
            fileInput.value = '';
            hideOverlay();
            refreshLibrary();
        }).catch(function (e) { hideOverlay(); alert('Add failed: ' + e.message); });
    });

    // ---- Add via URL ----
    function rewriteGDrive(url) {
        var m = url.match(/drive\.google\.com\/file\/d\/([^/?]+)/);
        return m ? 'https://drive.google.com/uc?export=download&id=' + m[1] : url;
    }

    /* Public CORS relays, tried in order if a direct fetch is blocked. The file
       passes through a third-party server, so this is a fallback only. */
    var CORS_PROXIES = [
        function (u) { return 'https://corsproxy.io/?url=' + encodeURIComponent(u); },
        function (u) { return 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u); },
        function (u) { return 'https://thingproxy.freeboard.io/fetch/' + u; }
    ];

    /* Fetch a URL as a Blob. Tries direct first; on a CORS/network failure,
       retries through each proxy until one works. onStatus(msg) for UI. */
    function fetchBlobWithFallback(url, onStatus) {
        function asBlob(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.blob(); }
        return fetch(url).then(asBlob).catch(function (directErr) {
            function tryProxy(i) {
                if (i >= CORS_PROXIES.length) {
                    throw new Error('Blocked by the source (CORS). Direct and all proxies failed.');
                }
                if (onStatus) onStatus('Direct blocked — trying relay ' + (i + 1) + '…');
                return fetch(CORS_PROXIES[i](url)).then(asBlob).catch(function () { return tryProxy(i + 1); });
            }
            return tryProxy(0);
        });
    }
    urlInput.addEventListener('input', function () {
        var has = !!urlInput.value.trim();
        btnUrl.disabled = !has; btnDriveSave.disabled = !has;
    });
    btnUrl.addEventListener('click', function () {
        var raw = urlInput.value.trim(); if (!raw) return;
        var url = rewriteGDrive(raw);
        var name = decodeURIComponent(url.split('/').pop().split('?')[0]) || 'book';
        showOverlay('Downloading…');
        fetchBlobWithFallback(url, showOverlay).then(function (blob) {
            return addBook(name, blob);
        }).then(function () {
            urlInput.value = ''; btnUrl.disabled = true; btnDriveSave.disabled = true;
            hideOverlay(); refreshLibrary();
        }).catch(function (e) {
            hideOverlay();
            alert('Download failed: ' + e.message);
        });
    });

    // ---- Save URL to Google Drive (same flow as the emulator page) ----
    function loadGoogleScripts(cb) {
        if (window._gReady) { cb(); return; }
        var pending = 2; function done() { if (--pending === 0) { window._gReady = true; cb(); } }
        var a = document.createElement('script'); a.src = 'https://apis.google.com/js/api.js'; a.onload = done; a.onerror = done; document.body.appendChild(a);
        var b = document.createElement('script'); b.src = 'https://accounts.google.com/gsi/client'; b.onload = done; b.onerror = done; document.body.appendChild(b);
    }
    function driveToken() {
        return new Promise(function (res, rej) {
            loadGoogleScripts(function () {
                gapi.load('client', function () {
                    google.accounts.oauth2.initTokenClient({
                        client_id: CLIENT_ID, scope: DRIVE_RW,
                        callback: function (resp) { resp.error ? rej(new Error(resp.error)) : res(resp.access_token); }
                    }).requestAccessToken();
                });
            });
        });
    }
    function uploadToDrive(blob, name, token) {
        var meta = { name: name };
        var form = new FormData();
        form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
        form.append('file', blob);
        return fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name', {
            method: 'POST', headers: { Authorization: 'Bearer ' + token }, body: form
        }).then(function (r) {
            if (!r.ok) return r.text().then(function (t) { throw new Error('HTTP ' + r.status + ' ' + t); });
            return r.json();
        });
    }
    btnDriveSave.addEventListener('click', function () {
        var raw = urlInput.value.trim(); if (!raw) return;
        var url = rewriteGDrive(raw);
        var name = decodeURIComponent(url.split('/').pop().split('?')[0]) || 'book';
        showOverlay('Downloading…');
        fetchBlobWithFallback(url, showOverlay)
            .then(function (blob) {
                showOverlay('Authorizing Google Drive…');
                return driveToken().then(function (t) { showOverlay('Uploading to Drive…'); return uploadToDrive(blob, name, t); });
            })
            .then(function (file) { hideOverlay(); alert('Saved to Google Drive: ' + (file && file.name ? file.name : name)); })
            .catch(function (e) { hideOverlay(); alert('Save failed: ' + e.message + '\n\nThe source must allow cross-origin (CORS) downloads.'); });
    });

    // ---- Boot ----
    refreshLibrary();
})();
</script>
</body>
</html>
