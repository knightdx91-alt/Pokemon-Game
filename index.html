<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pokémon — Kanto</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #060610;
            color: #c8d8e8;
            font-family: "Courier New", Courier, monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 32px;
            padding: 24px;
        }
        h1 {
            font-size: 22px;
            color: #80d0e8;
            text-align: center;
            letter-spacing: 2px;
            text-shadow: 0 0 12px #18b8c8;
        }
        .subtitle {
            font-size: 11px;
            color: #446;
            text-align: center;
            margin-top: -24px;
        }
        .btn-row {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            max-width: 320px;
        }
        .launch-btn {
            display: block;
            width: 100%;
            padding: 18px 12px;
            background: #0a1830;
            color: #18b8c8;
            border: 2px solid #18b8c8;
            border-radius: 6px;
            font-family: "Courier New", Courier, monospace;
            font-size: 15px;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            box-shadow: 0 0 0 1px #000, inset 0 0 0 1px #002830;
            transition: background 0.15s, color 0.15s;
            touch-action: manipulation;
        }
        .launch-btn:active, .launch-btn:hover {
            background: #18b8c8;
            color: #060610;
        }
        .launch-btn .btn-title {
            font-size: 16px;
            font-weight: bold;
            display: block;
        }
        .launch-btn .btn-sub {
            font-size: 10px;
            color: #80d0e8;
            display: block;
            margin-top: 4px;
            opacity: 0.8;
        }
        .launch-btn:active .btn-sub,
        .launch-btn:hover .btn-sub { color: #060610; opacity: 0.7; }
    </style>
</head>
<body>
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(reg) { reg.unregister(); });
        }).then(function() {
            navigator.serviceWorker.register('sw.js');
        });
    }
</script>
    <h1>&#9679; POKÉMON — KANTO &#9679;</h1>
    <p class="subtitle">Choose a game to launch</p>
    <div class="btn-row">
        <a class="launch-btn" href="game.html?v=__CACHE_BUST__">
            <span class="btn-title">&#127918; Pokémon RPG</span>
            <span class="btn-sub">Browser-based Kanto adventure</span>
        </a>
        <a class="launch-btn" href="emerald.html?v=__CACHE_BUST__">
            <span class="btn-title">&#127381; Emerald Enhanced</span>
            <span class="btn-sub">GBA ROM — loads from repo</span>
        </a>
        <a class="launch-btn" href="pokemon-black.html?v=__CACHE_BUST__">
            <span class="btn-title">&#9899; Pokémon Black</span>
            <span class="btn-sub">NDS ROM — melonDS</span>
        </a>
        <a class="launch-btn" href="emulator.html?v=__CACHE_BUST__">
            <span class="btn-title">&#127074; Emulator</span>
            <span class="btn-sub">All systems — load from Google Drive</span>
        </a>
    </div>
</body>
</html>
