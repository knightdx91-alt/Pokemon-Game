<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Pokémon Black — NDS</title>
    <!-- v__CACHE_BUST__ -->
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #000;
            color: #c8d8e8;
            font-family: "Courier New", Courier, monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }
        #top-bar {
            width: 100%;
            background: #0a1830;
            border-bottom: 1px solid #18b8c8;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 10px;
            gap: 8px;
        }
        #top-bar a {
            color: #18b8c8;
            text-decoration: none;
            font-size: 12px;
            border: 1px solid #18b8c8;
            border-radius: 3px;
            padding: 4px 8px;
            touch-action: manipulation;
        }
        #top-bar span {
            font-size: 12px;
            color: #80d0e8;
        }
        #screenshot-btn-emu {
            background: #0a1830;
            color: #18b8c8;
            border: 1px solid #18b8c8;
            border-radius: 3px;
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
            font-family: "Courier New", Courier, monospace;
            touch-action: manipulation;
        }
        #emu-wrap {
            width: 100%;
            max-width: 800px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        #game {
            width: 100%;
            min-height: 500px;
            flex: 1;
        }
        #status {
            padding: 8px 12px;
            font-size: 11px;
            color: #80d0e8;
            background: #0a1830;
            border-top: 1px solid #18b8c8;
            min-height: 24px;
        }
    </style>
</head>
<body>
    <div id="top-bar">
        <a href="index.html">&#8592; Menu</a>
        <span>Pokémon Black</span>
        <button id="screenshot-btn-emu">&#128247; Screenshot</button>
    </div>

    <div id="emu-wrap">
        <div id="game"></div>
        <div id="status">Loading emulator…</div>
    </div>

    <script>
        // Register service worker for caching ROM + EmulatorJS assets
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(function(reg) {
                var s = document.getElementById('status');
                if (reg.installing) {
                    if (s) s.textContent = 'Downloading game data (cached after first run)…';
                } else if (reg.active) {
                    if (s) s.textContent = 'Loading from cache…';
                }
            });
        }
    </script>
    <script>
        // EmulatorJS config — NDS core (melonDS)
        window.EJS_player = '#game';
        window.EJS_core = 'nds';
        // ↓ Replace this URL with your ROM host URL
        window.EJS_gameUrl = 'YOUR_ROM_URL_HERE';
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        window.EJS_color = '#18b8c8';
        window.EJS_backgroundColor = '#060610';
        window.EJS_startOnLoaded = true;
        window.EJS_onGameStart = function() {
            var s = document.getElementById('status');
            if (s) s.textContent = 'Running — Pokémon Black';
        };
        window.EJS_onLoadState = function() {};
        window.addEventListener('error', function(e) {
            var s = document.getElementById('status');
            if (s) s.textContent = 'Error: ' + e.message + ' (' + (e.filename||'') + ':' + e.lineno + ')';
        });
        window.EJS_Buttons = {
            playPause: true,
            restart: true,
            mute: true,
            settings: true,
            fullscreen: true,
            saveState: true,
            loadState: true,
            screenRecord: false,
            gamepad: true,
            cheat: false,
            volume: true,
            saveSavFiles: true,
            loadSavFiles: true,
            quickSave: true,
            quickLoad: true,
        };
    </script>
    <script>
        // Check ROM URL is set before trying to load
        var statusEl = document.getElementById('status');
        if (window.EJS_gameUrl === 'YOUR_ROM_URL_HERE') {
            statusEl.textContent = 'ROM URL not set — edit pokemon-black.html and replace YOUR_ROM_URL_HERE with your ROM URL.';
            statusEl.style.color = '#e8c000';
        } else {
            fetch(window.EJS_gameUrl, { method: 'HEAD' })
                .then(function(r) {
                    if (r.ok) {
                        var mb = r.headers.get('content-length');
                        mb = mb ? ' (' + (mb / 1024 / 1024).toFixed(1) + ' MB)' : '';
                        if (statusEl) statusEl.textContent = 'ROM found' + mb + ' — loading emulator…';
                    } else {
                        if (statusEl) statusEl.textContent = 'ERROR: ROM not reachable (HTTP ' + r.status + ')';
                    }
                })
                .catch(function(e) {
                    if (statusEl) statusEl.textContent = 'ERROR fetching ROM: ' + e.message;
                });
        }
    </script>
    <script>
        // Force WebGL preserveDrawingBuffer so screenshots work
        (function() {
            var _orig = HTMLCanvasElement.prototype.getContext;
            HTMLCanvasElement.prototype.getContext = function(type, attrs) {
                if (type === 'webgl' || type === 'webgl2' || type === 'experimental-webgl') {
                    attrs = Object.assign({}, attrs || {}, { preserveDrawingBuffer: true });
                }
                return _orig.call(this, type, attrs);
            };
        })();
    </script>
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"
            onerror="document.getElementById('status').textContent='ERROR: Failed to load EmulatorJS CDN — check internet connection.'">
    </script>

    <script src="emulator-screenshot.js?v=__CACHE_BUST__"></script>
    <script src="emulator-saves.js?v=__CACHE_BUST__"></script>
    <script>
        document.getElementById('screenshot-btn-emu').addEventListener('click', function() {
            var canvas = document.querySelector('#game canvas');
            if (!canvas) { alert('Emulator not loaded yet.'); return; }
            var token = localStorage.getItem('gh_debug_token');
            if (!token) {
                token = prompt('Enter your GitHub token (public_repo scope):');
                if (!token) return;
                localStorage.setItem('gh_debug_token', token);
            }
            var dataUrl = canvas.toDataURL('image/jpeg', 0.85);
            var ext = dataUrl.startsWith('data:image/png') ? 'png' : 'jpg';
            var base64 = dataUrl.replace(/^data:image\/(jpeg|png);base64,/, '');
            var ts = new Date().toISOString().replace(/[:.]/g, '-');
            var files = {};
            files['black-shot-' + ts + '.' + ext] = { content: base64 };
            files['view.html'] = { content: '<!DOCTYPE html><html><body style="margin:0;background:#000"><img src="data:image/' + ext + ';base64,' + base64 + '" style="max-width:100%;image-rendering:pixelated"></body></html>' };
            fetch('https://api.github.com/gists', {
                method: 'POST',
                headers: { Authorization: 'token ' + token, 'Content-Type': 'application/json' },
                body: JSON.stringify({ description: 'Pokemon Black screenshot ' + ts, public: false, files: files })
            })
            .then(function(r) {
                if (!r.ok) return r.text().then(function(t){ var m=t; try{m=JSON.parse(t).message||t;}catch(e){} throw new Error(r.status+': '+m); });
                return r.json();
            })
            .then(function(g) {
                var btn = document.getElementById('screenshot-btn-emu');
                if (btn) { btn.style.color = '#20d840'; setTimeout(function(){ btn.style.color = '#18b8c8'; }, 2000); }
                prompt('Screenshot saved — link:', g.html_url);
            })
            .catch(function(e) { alert('Screenshot error:\n' + e.message); });
        });
    </script>
</body>
</html>
