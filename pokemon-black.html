<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Pokémon Black — NDS</title>
    <!-- v__CACHE_BUST__ -->
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #000;
            color: #c8d8e8;
            font-family: "Courier New", Courier, monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }
        #top-bar {
            width: 100%;
            background: #0a1830;
            border-bottom: 1px solid #18b8c8;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 10px;
            gap: 8px;
        }
        #top-bar a {
            color: #18b8c8;
            text-decoration: none;
            font-size: 12px;
            border: 1px solid #18b8c8;
            border-radius: 3px;
            padding: 4px 8px;
            touch-action: manipulation;
        }
        #top-bar span {
            font-size: 12px;
            color: #80d0e8;
        }
        #screenshot-btn-emu {
            background: #0a1830;
            color: #18b8c8;
            border: 1px solid #18b8c8;
            border-radius: 3px;
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
            font-family: "Courier New", Courier, monospace;
            touch-action: manipulation;
        }
        #emu-wrap {
            width: 100%;
            max-width: 800px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        #game {
            width: 100%;
            min-height: 500px;
            flex: 1;
        }
        #status {
            padding: 8px 12px;
            font-size: 11px;
            color: #80d0e8;
            background: #0a1830;
            border-top: 1px solid #18b8c8;
            min-height: 24px;
        }
        #progress-bar-wrap {
            width: 100%;
            background: #0a1830;
            padding: 0 12px 8px;
            display: none;
        }
        #progress-bar {
            height: 6px;
            background: #18b8c8;
            border-radius: 3px;
            width: 0%;
            transition: width 0.2s;
        }
    </style>
</head>
<body>
    <div id="top-bar">
        <a href="index.html">&#8592; Menu</a>
        <span>Pokémon Black</span>
        <button id="screenshot-btn-emu">&#128247; Screenshot</button>
    </div>

    <div id="emu-wrap">
        <div id="game"></div>
        <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
        <div id="status">Initialising…</div>
    </div>

    <script>
        // Force WebGL preserveDrawingBuffer so screenshots work
        (function() {
            var _orig = HTMLCanvasElement.prototype.getContext;
            HTMLCanvasElement.prototype.getContext = function(type, attrs) {
                if (type === 'webgl' || type === 'webgl2' || type === 'experimental-webgl') {
                    attrs = Object.assign({}, attrs || {}, { preserveDrawingBuffer: true });
                }
                return _orig.call(this, type, attrs);
            };
        })();
    </script>

    <script>
        // EmulatorJS config — NDS core (melonDS)
        // EJS_gameUrl is set dynamically below after ROM is fetched/cached
        window.EJS_player = '#game';
        window.EJS_core = 'nds';
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        window.EJS_color = '#18b8c8';
        window.EJS_backgroundColor = '#060610';
        window.EJS_startOnLoaded = true;
        window.EJS_onGameStart = function() {
            var s = document.getElementById('status');
            if (s) s.textContent = 'Running — Pokémon Black';
        };
        window.EJS_onLoadState = function() {};
        window.addEventListener('error', function(e) {
            var s = document.getElementById('status');
            if (s) s.textContent = 'Error: ' + e.message + ' (' + (e.filename||'') + ':' + e.lineno + ')';
        });
        window.EJS_Buttons = {
            playPause: true,
            restart: true,
            mute: true,
            settings: true,
            fullscreen: true,
            saveState: true,
            loadState: true,
            screenRecord: false,
            gamepad: true,
            cheat: false,
            volume: true,
            saveSavFiles: true,
            loadSavFiles: true,
            quickSave: true,
            quickLoad: true,
        };
    </script>

    <script>
        // ROM loader — fetches via GitHub API (CORS-safe) and caches in CacheStorage
        // so the 106 MB download only happens once.
        (function() {
            var CACHE_NAME  = 'pokemon-black-rom-v1';
            var CACHE_KEY   = 'pokemon-black-rom';
            var ASSET_ID    = 442307397; // release asset id
            var statusEl    = document.getElementById('status');
            var progressWrap = document.getElementById('progress-bar-wrap');
            var progressBar  = document.getElementById('progress-bar');

            function setStatus(msg, color) {
                if (statusEl) { statusEl.textContent = msg; if (color) statusEl.style.color = color; }
            }
            function setProgress(pct) {
                if (progressWrap) progressWrap.style.display = 'block';
                if (progressBar)  progressBar.style.width = pct + '%';
            }
            function launchEmulator(blobUrl) {
                window.EJS_gameUrl = blobUrl;
                if (progressWrap) progressWrap.style.display = 'none';
                setStatus('ROM ready — loading emulator…');
                var s = document.createElement('script');
                s.onerror = function() { setStatus('ERROR: Failed to load EmulatorJS CDN — check internet connection.'); };
                s.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
                document.body.appendChild(s);
            }

            function fetchAndCache(token) {
                setStatus('Downloading ROM (106 MB) — first time only, will be cached…');
                setProgress(0);

                fetch('https://api.github.com/repos/knightdx91-alt/Pokemon-Game/releases/assets/' + ASSET_ID, {
                    headers: {
                        'Authorization': 'token ' + token,
                        'Accept': 'application/octet-stream'
                    }
                }).then(function(r) {
                    if (!r.ok) throw new Error('HTTP ' + r.status);
                    var total = parseInt(r.headers.get('content-length') || '0', 10);
                    var loaded = 0;
                    var reader = r.body.getReader();
                    var chunks = [];
                    function pump() {
                        return reader.read().then(function(d) {
                            if (d.done) {
                                var blob = new Blob(chunks, { type: 'application/zip' });
                                // Cache it so next visit is instant
                                caches.open(CACHE_NAME).then(function(cache) {
                                    cache.put(CACHE_KEY, new Response(blob, {
                                        headers: { 'Content-Type': 'application/zip' }
                                    }));
                                });
                                var url = URL.createObjectURL(blob);
                                launchEmulator(url);
                                return;
                            }
                            chunks.push(d.value);
                            loaded += d.value.length;
                            if (total) {
                                var pct = Math.round(loaded / total * 100);
                                setProgress(pct);
                                setStatus('Downloading ROM… ' + pct + '% (' + (loaded/1024/1024).toFixed(1) + ' / ' + (total/1024/1024).toFixed(1) + ' MB)');
                            }
                            return pump();
                        });
                    }
                    return pump();
                }).catch(function(e) {
                    setStatus('ERROR downloading ROM: ' + e.message, '#e84040');
                });
            }

            function start() {
                // 1. Check cache first
                caches.open(CACHE_NAME).then(function(cache) {
                    cache.match(CACHE_KEY).then(function(cached) {
                        if (cached) {
                            setStatus('Loading ROM from cache…');
                            cached.blob().then(function(blob) {
                                launchEmulator(URL.createObjectURL(blob));
                            });
                            return;
                        }
                        // 2. Not cached — need token to fetch via API
                        var token = localStorage.getItem('gh_debug_token');
                        if (!token) {
                            token = prompt('Enter your GitHub token to download the ROM\n(same token used for screenshots — stored locally only):');
                            if (!token) { setStatus('Token required to download ROM.', '#e8c000'); return; }
                            localStorage.setItem('gh_debug_token', token);
                        }
                        fetchAndCache(token);
                    });
                }).catch(function() {
                    // CacheStorage not available (e.g. private mode) — fetch directly
                    var token = localStorage.getItem('gh_debug_token');
                    if (!token) {
                        token = prompt('Enter your GitHub token to download the ROM:');
                        if (!token) { setStatus('Token required to download ROM.', '#e8c000'); return; }
                        localStorage.setItem('gh_debug_token', token);
                    }
                    fetchAndCache(token);
                });
            }

            // Register SW for EmulatorJS asset caching, then start ROM load
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').then(start);
            } else {
                start();
            }
        })();
    </script>

    <script src="emulator-screenshot.js?v=__CACHE_BUST__"></script>
    <script src="emulator-saves.js?v=__CACHE_BUST__"></script>
    <script>
        document.getElementById('screenshot-btn-emu').addEventListener('click', function() {
            var canvas = document.querySelector('#game canvas');
            if (!canvas) { alert('Emulator not loaded yet.'); return; }
            var token = localStorage.getItem('gh_debug_token');
            if (!token) {
                token = prompt('Enter your GitHub token (public_repo scope):');
                if (!token) return;
                localStorage.setItem('gh_debug_token', token);
            }
            var dataUrl = canvas.toDataURL('image/jpeg', 0.85);
            var ext = dataUrl.startsWith('data:image/png') ? 'png' : 'jpg';
            var base64 = dataUrl.replace(/^data:image\/(jpeg|png);base64,/, '');
            var ts = new Date().toISOString().replace(/[:.]/g, '-');
            var files = {};
            files['black-shot-' + ts + '.' + ext] = { content: base64 };
            files['view.html'] = { content: '<!DOCTYPE html><html><body style="margin:0;background:#000"><img src="data:image/' + ext + ';base64,' + base64 + '" style="max-width:100%;image-rendering:pixelated"></body></html>' };
            fetch('https://api.github.com/gists', {
                method: 'POST',
                headers: { Authorization: 'token ' + token, 'Content-Type': 'application/json' },
                body: JSON.stringify({ description: 'Pokemon Black screenshot ' + ts, public: false, files: files })
            })
            .then(function(r) {
                if (!r.ok) return r.text().then(function(t){ var m=t; try{m=JSON.parse(t).message||t;}catch(e){} throw new Error(r.status+': '+m); });
                return r.json();
            })
            .then(function(g) {
                var btn = document.getElementById('screenshot-btn-emu');
                if (btn) { btn.style.color = '#20d840'; setTimeout(function(){ btn.style.color = '#18b8c8'; }, 2000); }
                prompt('Screenshot saved — link:', g.html_url);
            })
            .catch(function(e) { alert('Screenshot error:\n' + e.message); });
        });
    </script>
</body>
</html>
