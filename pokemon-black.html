<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pokémon Black — NDS</title>
    <!-- v__CACHE_BUST__ -->
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #000; color: #c8d8e8;
            font-family: "Courier New", Courier, monospace;
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
        }
        #top-bar {
            width: 100%; background: #0a1830; border-bottom: 1px solid #18b8c8;
            display: flex; align-items: center; justify-content: space-between;
            padding: 6px 10px; gap: 8px;
        }
        #top-bar a { color: #18b8c8; text-decoration: none; font-size: 12px; border: 1px solid #18b8c8; border-radius: 3px; padding: 4px 8px; touch-action: manipulation; }
        #top-bar span { font-size: 12px; color: #80d0e8; }
        #screenshot-btn-emu { background: #0a1830; color: #18b8c8; border: 1px solid #18b8c8; border-radius: 3px; padding: 4px 8px; font-size: 12px; cursor: pointer; font-family: "Courier New", Courier, monospace; touch-action: manipulation; }

        #loading-screen {
            width: 100%; max-width: 600px; padding: 32px 20px;
            display: flex; flex-direction: column; align-items: center; gap: 18px;
        }
        .load-title { font-size: 16px; color: #18b8c8; letter-spacing: 2px; }

        #progress-wrap { width: 100%; }
        #progress-bar-bg { background: #060610; border: 1px solid #18b8c8; border-radius: 3px; height: 12px; overflow: hidden; }
        #progress-bar-fill { height: 100%; background: #18b8c8; width: 0%; transition: width 0.25s; }
        #dl-status { font-size: 11px; color: #e8c000; margin-top: 6px; min-height: 16px; text-align: center; }

        #picker-section {
            width: 100%; display: none; flex-direction: column; align-items: center; gap: 12px;
        }
        #picker-section p { font-size: 12px; color: #80d0e8; text-align: center; line-height: 1.6; }
        .big-btn {
            display: block; width: 100%; max-width: 320px; padding: 11px;
            background: #060610; color: #18b8c8;
            border: 1px solid #18b8c8; border-radius: 4px;
            font-size: 13px; font-family: "Courier New", Courier, monospace;
            cursor: pointer; touch-action: manipulation; text-align: center;
        }
        .big-btn:disabled { opacity: 0.5; cursor: default; }

        #emu-wrap { width: 100%; max-width: 800px; flex: 1; display: flex; flex-direction: column; }
        #game { width: 100%; min-height: 500px; flex: 1; }
        #status { padding: 8px 12px; font-size: 11px; color: #80d0e8; background: #0a1830; border-top: 1px solid #18b8c8; min-height: 24px; word-break: break-all; }

        #debug-bar { width: 100%; max-width: 800px; background: #060610; border-top: 1px solid #222; padding: 5px 10px; display: flex; gap: 6px; flex-wrap: wrap; }
        .dbg-btn { background: #0a1830; color: #e8c000; border: 1px solid #e8c000; border-radius: 3px; padding: 3px 9px; font-size: 11px; font-family: "Courier New", Courier, monospace; cursor: pointer; touch-action: manipulation; }
    </style>
</head>
<body>
    <div id="top-bar">
        <a href="index.html">&#8592; Menu</a>
        <span>Pokémon Black</span>
        <button id="screenshot-btn-emu">&#128247; Screenshot</button>
    </div>

    <div id="loading-screen">
        <div class="load-title">POKÉMON BLACK</div>

        <div id="progress-wrap">
            <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
            <div id="dl-status">Checking local cache…</div>
        </div>

        <div id="picker-section">
            <p>
                Auto-download failed (GitHub CDN blocks cross-origin requests).<br>
                Load <strong>pokemon-black.nds</strong> from your Google Drive instead.
            </p>
            <button class="big-btn" id="btn-picker">&#9729; Open Google Drive Picker</button>
        </div>
    </div>

    <div id="emu-wrap" style="display:none">
        <div id="game"></div>
        <div id="status">Loading…</div>
    </div>
    <div id="debug-bar">
        <button class="dbg-btn" id="btn-clear-cache">&#128465; Clear ROM Cache</button>
    </div>

    <!-- fflate for unzipping release zip fallback -->
    <script src="https://cdn.jsdelivr.net/npm/fflate@0.8.2/umd/index.js"></script>
    <!-- Google APIs for Drive Picker -->
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>

    <script>
        (function() {
            var _orig = HTMLCanvasElement.prototype.getContext;
            HTMLCanvasElement.prototype.getContext = function(type, attrs) {
                if (type === 'webgl' || type === 'webgl2' || type === 'experimental-webgl') {
                    attrs = Object.assign({}, attrs || {}, { preserveDrawingBuffer: true });
                }
                return _orig.call(this, type, attrs);
            };
        })();
    </script>

    <script>
    (function() {
        var CLIENT_ID    = '74660999441-3tu0u98phuckm7avp4kh6rnohpo84l1f.apps.googleusercontent.com';
        var SCOPE        = 'https://www.googleapis.com/auth/drive.readonly';
        var LFS_OID      = '2e40416b8e8183d936084c7be0adeaab4fa3f786a68f90d7291ab77d340f0c1d';
        var LFS_SIZE     = 268435456;
        var LFS_BATCH    = 'https://github.com/knightdx91-alt/Pokemon-Game.git/info/lfs/objects/batch';
        var ZIP_URL      = 'https://github.com/knightdx91-alt/Pokemon-Game/releases/download/roms-v1/pokemon-black.zip';

        var IDB_DB    = 'pokemon-black-rom-v2';
        var IDB_STORE = 'rom';
        var IDB_KEY   = 'nds';

        var loadingEl    = document.getElementById('loading-screen');
        var emuEl        = document.getElementById('emu-wrap');
        var statusEl     = document.getElementById('status');
        var progFill     = document.getElementById('progress-bar-fill');
        var dlStatusEl   = document.getElementById('dl-status');
        var pickerSection = document.getElementById('picker-section');
        var pickerBtn    = document.getElementById('btn-picker');

        var _accessToken = null;

        function setStatus(msg) { if (statusEl) statusEl.textContent = msg; }
        function setDl(msg, color) { dlStatusEl.textContent = msg; dlStatusEl.style.color = color || '#e8c000'; }
        function setProgress(pct) { progFill.style.width = Math.min(100, Math.max(0, pct)) + '%'; }

        // ── IndexedDB ──────────────────────────────────────────────────────
        function openDB() {
            return new Promise(function(res, rej) {
                var r = indexedDB.open(IDB_DB, 1);
                r.onupgradeneeded = function(e) { e.target.result.createObjectStore(IDB_STORE); };
                r.onsuccess = function(e) { res(e.target.result); };
                r.onerror   = function(e) { rej(e.target.error); };
            });
        }
        function idbGet(db) {
            return new Promise(function(res, rej) {
                var r = db.transaction(IDB_STORE,'readonly').objectStore(IDB_STORE).get(IDB_KEY);
                r.onsuccess = function(e) { res(e.target.result || null); };
                r.onerror   = function(e) { rej(e.target.error); };
            });
        }
        function idbPut(db, blob) {
            return new Promise(function(res, rej) {
                var r = db.transaction(IDB_STORE,'readwrite').objectStore(IDB_STORE).put(blob, IDB_KEY);
                r.onsuccess = function() { res(); };
                r.onerror   = function(e) { rej(e.target.error); };
            });
        }
        function idbDel(db) {
            return new Promise(function(res, rej) {
                var r = db.transaction(IDB_STORE,'readwrite').objectStore(IDB_STORE).delete(IDB_KEY);
                r.onsuccess = function() { res(); };
                r.onerror   = function(e) { rej(e.target.error); };
            });
        }

        // ── Stream download with MB/MB progress ───────────────────────────
        function streamFetch(url, headers, label) {
            return fetch(url, { headers: headers || {} }).then(function(resp) {
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                var total = parseInt(resp.headers.get('content-length') || '0', 10);

                if (resp.body && resp.body.getReader) {
                    var reader = resp.body.getReader();
                    var chunks = [], loaded = 0;
                    function pump() {
                        return reader.read().then(function(r) {
                            if (r.done) {
                                var out = new Uint8Array(loaded), off = 0;
                                chunks.forEach(function(c) { out.set(c, off); off += c.length; });
                                return out.buffer;
                            }
                            chunks.push(r.value);
                            loaded += r.value.length;
                            if (total) {
                                var pct = Math.round(loaded / total * 90);
                                var mb  = (loaded / 1048576).toFixed(1);
                                var tot = (total  / 1048576).toFixed(1);
                                setProgress(pct);
                                setDl((label || 'Downloading') + '   ' + mb + ' / ' + tot + ' MB');
                            } else {
                                var mb2 = (loaded / 1048576).toFixed(1);
                                setDl((label || 'Downloading') + '   ' + mb2 + ' MB received…');
                            }
                            return pump();
                        });
                    }
                    return pump();
                }
                setDl((label || 'Downloading') + '…  please wait');
                setProgress(50);
                return resp.arrayBuffer();
            });
        }

        // ── Unzip NDS from zip bytes ───────────────────────────────────────
        function unzipNDS(buf) {
            return new Promise(function(res, rej) {
                if (typeof fflate === 'undefined') { rej(new Error('fflate not loaded')); return; }
                setDl('Extracting .nds from zip…');
                setProgress(93);
                try {
                    var files = fflate.unzipSync(new Uint8Array(buf));
                    var key = Object.keys(files).find(function(k) { return k.toLowerCase().endsWith('.nds'); });
                    if (!key) { rej(new Error('No .nds file found in zip')); return; }
                    res(new Blob([files[key]], { type: 'application/octet-stream' }));
                } catch(e) { rej(e); }
            });
        }

        // ── EmulatorJS launch ──────────────────────────────────────────────
        function launchEJS(blobUrl) {
            loadingEl.style.display = 'none';
            emuEl.style.display = 'flex';
            setStatus('Loading emulator core…');
            window.EJS_player          = '#game';
            window.EJS_core            = 'nds';
            window.EJS_gameUrl         = blobUrl;
            window.EJS_pathtodata      = 'https://cdn.emulatorjs.org/stable/data/';
            window.EJS_color           = '#18b8c8';
            window.EJS_backgroundColor = '#060610';
            window.EJS_startOnLoaded   = true;
            window.EJS_onGameStart     = function() { setStatus('Running — Pokémon Black'); };
            window.EJS_Buttons = {
                playPause:true, restart:true, mute:true, settings:true, fullscreen:true,
                saveState:true, loadState:true, screenRecord:false, gamepad:true,
                cheat:false, volume:true, saveSavFiles:true, loadSavFiles:true,
                quickSave:true, quickLoad:true,
            };
            var s = document.createElement('script');
            s.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
            s.onerror = function() { setStatus('ERROR: Failed to load EmulatorJS.'); };
            document.body.appendChild(s);
        }

        // ── Cache blob and launch ──────────────────────────────────────────
        function cacheAndLaunch(blob) {
            setDl('Saving to cache…', '#20d840');
            setProgress(100);
            return openDB().then(function(db) {
                return idbPut(db, blob).then(function() {
                    launchEJS(URL.createObjectURL(blob));
                });
            });
        }

        // ── Show Google Drive picker option ────────────────────────────────
        function showPickerOption() {
            pickerSection.style.display = 'flex';
            setProgress(0);
        }

        // ── Try LFS Batch API ──────────────────────────────────────────────
        function tryLFS() {
            setDl('Trying LFS download…');
            setProgress(2);
            return fetch(LFS_BATCH, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/vnd.git-lfs+json',
                    'Accept':       'application/vnd.git-lfs+json',
                },
                body: JSON.stringify({
                    operation: 'download', transfers: ['basic'],
                    refs: { name: 'refs/heads/main' },
                    objects: [{ oid: LFS_OID, size: LFS_SIZE }]
                })
            }).then(function(r) {
                if (!r.ok) throw new Error('LFS API HTTP ' + r.status);
                return r.json();
            }).then(function(data) {
                var obj = data.objects && data.objects[0];
                if (!obj || !obj.actions || !obj.actions.download) throw new Error('No LFS download action');
                var dl = obj.actions.download;
                return streamFetch(dl.href, dl.header || {}, 'Downloading');
            }).then(function(buf) {
                return new Blob([buf], { type: 'application/octet-stream' });
            });
        }

        // ── Try release zip ────────────────────────────────────────────────
        function tryZip() {
            setDl('Trying release zip…');
            setProgress(2);
            return streamFetch(ZIP_URL, {}, 'Downloading').then(unzipNDS);
        }

        // ── Google Drive Picker ────────────────────────────────────────────
        function openDrivePicker(token) {
            gapi.load('picker', function() {
                var picker = new google.picker.PickerBuilder()
                    .addView(new google.picker.DocsView(google.picker.ViewId.DOCS)
                        .setMimeTypes('application/octet-stream,application/x-nintendo-ds-rom')
                        .setQuery('pokemon black'))
                    .setOAuthToken(token)
                    .setCallback(function(data) {
                        if (data[google.picker.Response.ACTION] === google.picker.Action.PICKED) {
                            var doc = data[google.picker.Response.DOCUMENTS][0];
                            downloadFromDrive(doc[google.picker.Document.ID], doc[google.picker.Document.NAME], token);
                        }
                    })
                    .build();
                picker.setVisible(true);
            });
        }

        function downloadFromDrive(fileId, fileName, token) {
            pickerBtn.disabled = true;
            setDl('Starting download: ' + fileName + '…');
            setProgress(2);
            var url = 'https://www.googleapis.com/drive/v3/files/' + fileId + '?alt=media';
            streamFetch(url, { 'Authorization': 'Bearer ' + token }, 'Downloading ' + fileName)
                .then(function(buf) {
                    var lower = fileName.toLowerCase();
                    if (lower.endsWith('.zip')) {
                        return unzipNDS(buf);
                    } else {
                        return new Blob([buf], { type: 'application/octet-stream' });
                    }
                })
                .then(cacheAndLaunch)
                .catch(function(err) {
                    setDl('Drive download failed: ' + err.message, '#e84040');
                    pickerBtn.disabled = false;
                });
        }

        function startDrivePicker() {
            setDl('Opening Google sign-in…');
            gapi.load('client', function() {
                var client = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID,
                    scope: SCOPE,
                    callback: function(resp) {
                        if (resp.error) { setDl('Sign-in failed: ' + resp.error, '#e84040'); return; }
                        _accessToken = resp.access_token;
                        openDrivePicker(_accessToken);
                    }
                });
                client.requestAccessToken();
            });
        }

        pickerBtn.addEventListener('click', startDrivePicker);

        // ── Boot ───────────────────────────────────────────────────────────
        openDB().then(function(db) {
            return idbGet(db).then(function(cached) {
                if (cached) {
                    setDl('Loading from cache…', '#20d840');
                    setProgress(100);
                    launchEJS(URL.createObjectURL(cached));
                    return;
                }
                // Try LFS, then zip, then show Drive picker
                tryLFS()
                    .then(cacheAndLaunch)
                    .catch(function() {
                        return tryZip()
                            .then(cacheAndLaunch)
                            .catch(function() { showPickerOption(); });
                    });
            });
        }).catch(function() {
            tryLFS()
                .then(cacheAndLaunch)
                .catch(function() {
                    return tryZip()
                        .then(cacheAndLaunch)
                        .catch(function() { showPickerOption(); });
                });
        });

        // ── Clear cache ────────────────────────────────────────────────────
        document.getElementById('btn-clear-cache').addEventListener('click', function() {
            openDB().then(function(db) { return idbDel(db); })
                .then(function() { location.reload(); })
                .catch(function(e) { alert('Clear failed: ' + e.message); });
        });
    })();
    </script>

    <script src="emulator-saves.js?v=__CACHE_BUST__"></script>
    <script src="emulator-screenshot.js?v=__CACHE_BUST__"></script>
</body>
</html>
