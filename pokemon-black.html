<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Pokémon Black — NDS</title>
    <!-- v__CACHE_BUST__ -->
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #000;
            color: #c8d8e8;
            font-family: "Courier New", Courier, monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }
        #top-bar {
            width: 100%;
            background: #0a1830;
            border-bottom: 1px solid #18b8c8;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 10px;
            gap: 8px;
        }
        #top-bar a {
            color: #18b8c8;
            text-decoration: none;
            font-size: 12px;
            border: 1px solid #18b8c8;
            border-radius: 3px;
            padding: 4px 8px;
            touch-action: manipulation;
        }
        #top-bar span { font-size: 12px; color: #80d0e8; }
        #screenshot-btn-emu {
            background: #0a1830;
            color: #18b8c8;
            border: 1px solid #18b8c8;
            border-radius: 3px;
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
            font-family: "Courier New", Courier, monospace;
            touch-action: manipulation;
        }
        #emu-wrap { width: 100%; max-width: 800px; flex: 1; display: flex; flex-direction: column; }
        #game { width: 100%; min-height: 500px; flex: 1; }
        #status {
            padding: 8px 12px;
            font-size: 11px;
            color: #80d0e8;
            background: #0a1830;
            border-top: 1px solid #18b8c8;
            min-height: 24px;
            word-break: break-all;
        }
        #debug-bar {
            width: 100%;
            max-width: 800px;
            background: #060610;
            border-top: 1px solid #222;
            padding: 5px 10px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .dbg-btn {
            background: #0a1830;
            color: #e8c000;
            border: 1px solid #e8c000;
            border-radius: 3px;
            padding: 3px 9px;
            font-size: 11px;
            font-family: "Courier New", Courier, monospace;
            cursor: pointer;
            touch-action: manipulation;
        }
    </style>
</head>
<body>
    <div id="top-bar">
        <a href="index.html">&#8592; Menu</a>
        <span>Pokémon Black</span>
        <button id="screenshot-btn-emu">&#128247; Screenshot</button>
    </div>
    <div id="emu-wrap">
        <div id="game"></div>
        <div id="status">Initialising…</div>
    </div>
    <div id="debug-bar">
        <button class="dbg-btn" id="btn-clear-cache">🗑 Clear ROM Cache &amp; Retry</button>
        <button class="dbg-btn" id="btn-reset-token">🔑 Reset Token</button>
    </div>

    <script>
        (function() {
            var _orig = HTMLCanvasElement.prototype.getContext;
            HTMLCanvasElement.prototype.getContext = function(type, attrs) {
                if (type === 'webgl' || type === 'webgl2' || type === 'experimental-webgl') {
                    attrs = Object.assign({}, attrs || {}, { preserveDrawingBuffer: true });
                }
                return _orig.call(this, type, attrs);
            };
        })();
    </script>

    <script>
        // SW intercepts /pokemon-black-rom.zip, fetches from GitHub API (CORS-safe),
        // and caches — so EmulatorJS core and ROM download in parallel.
        (function() {
            var statusEl = document.getElementById('status');
            function setStatus(msg, color) {
                if (statusEl) { statusEl.textContent = msg; if (color) statusEl.style.color = color; }
            }

            function launch(token) {
                window.EJS_player = '#game';
                window.EJS_core = 'nds';
                window.EJS_gameUrl = '/pokemon-black-rom.zip?t=' + encodeURIComponent(token);
                window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
                window.EJS_color = '#18b8c8';
                window.EJS_backgroundColor = '#060610';
                window.EJS_startOnLoaded = true;
                window.EJS_onGameStart = function() { setStatus('Running — Pokémon Black'); };
                window.EJS_onLoadState = function() {};
                window.EJS_Buttons = {
                    playPause: true, restart: true, mute: true, settings: true,
                    fullscreen: true, saveState: true, loadState: true,
                    screenRecord: false, gamepad: true, cheat: false, volume: true,
                    saveSavFiles: true, loadSavFiles: true, quickSave: true, quickLoad: true,
                };
                setStatus('Loading emulator core + ROM (first run: ~106 MB download)…');
                var s = document.createElement('script');
                s.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
                s.onerror = function() { setStatus('ERROR: Failed to load EmulatorJS — check internet.', '#e84040'); };
                document.body.appendChild(s);
            }

            function start() {
                if (!('serviceWorker' in navigator)) {
                    setStatus('ERROR: Service Workers not supported in this browser.', '#e84040');
                    return;
                }
                var token = localStorage.getItem('gh_debug_token');
                if (!token) {
                    token = prompt('Enter your GitHub token to load the ROM\n(same token used for screenshots — stored locally only):');
                    if (!token) { setStatus('Token required to load ROM.', '#e8c000'); return; }
                    localStorage.setItem('gh_debug_token', token);
                }
                navigator.serviceWorker.register('sw.js').then(function(reg) {
                    if (reg.active) { launch(token); return; }
                    setStatus('Installing service worker…');
                    var pending = reg.installing || reg.waiting;
                    if (pending) {
                        pending.addEventListener('statechange', function(e) {
                            if (e.target.state === 'activated') launch(token);
                        });
                    }
                    var poll = setInterval(function() {
                        if (reg.active) { clearInterval(poll); launch(token); }
                    }, 200);
                }).catch(function(e) {
                    setStatus('ERROR: Service worker failed: ' + e.message, '#e84040');
                });
            }

            // Listen for error messages posted back from the SW
            navigator.serviceWorker && navigator.serviceWorker.addEventListener('message', function(e) {
                if (e.data && e.data.type === 'ROM_FETCH_ERROR') {
                    setStatus('ROM fetch failed — ' + e.data.msg, '#e84040');
                }
            });

            // Clear ROM cache button — wipes cached ROM and reloads
            document.getElementById('btn-clear-cache').addEventListener('click', function() {
                setStatus('Clearing ROM cache…', '#e8c000');
                if (navigator.serviceWorker && navigator.serviceWorker.controller) {
                    navigator.serviceWorker.controller.postMessage({ type: 'CLEAR_ROM_CACHE' });
                    navigator.serviceWorker.addEventListener('message', function handler(e) {
                        if (e.data && e.data.type === 'ROM_CACHE_CLEARED') {
                            navigator.serviceWorker.removeEventListener('message', handler);
                            setStatus('Cache cleared — reloading…', '#20d840');
                            setTimeout(function() { location.reload(); }, 800);
                        }
                    });
                } else {
                    // Fallback: delete via caches API directly
                    caches.delete('pokemon-black-rom-v1').then(function() {
                        setStatus('Cache cleared — reloading…', '#20d840');
                        setTimeout(function() { location.reload(); }, 800);
                    });
                }
            });

            // Reset token button
            document.getElementById('btn-reset-token').addEventListener('click', function() {
                localStorage.removeItem('gh_debug_token');
                setStatus('Token cleared — reloading…', '#e8c000');
                setTimeout(function() { location.reload(); }, 600);
            });

            window.addEventListener('error', function(e) {
                setStatus('Error: ' + e.message + ' (' + (e.filename || '') + ':' + e.lineno + ')');
            });

            start();
        })();
    </script>

    <script src="emulator-screenshot.js?v=__CACHE_BUST__"></script>
    <script src="emulator-saves.js?v=__CACHE_BUST__"></script>
    <script>
        document.getElementById('screenshot-btn-emu').addEventListener('click', function() {
            var canvas = document.querySelector('#game canvas');
            if (!canvas) { alert('Emulator not loaded yet.'); return; }
            var token = localStorage.getItem('gh_debug_token');
            if (!token) {
                token = prompt('Enter your GitHub token (public_repo scope):');
                if (!token) return;
                localStorage.setItem('gh_debug_token', token);
            }
            var dataUrl = canvas.toDataURL('image/jpeg', 0.85);
            var ext = dataUrl.startsWith('data:image/png') ? 'png' : 'jpg';
            var base64 = dataUrl.replace(/^data:image\/(jpeg|png);base64,/, '');
            var ts = new Date().toISOString().replace(/[:.]/g, '-');
            var files = {};
            files['black-shot-' + ts + '.' + ext] = { content: base64 };
            files['view.html'] = { content: '<!DOCTYPE html><html><body style="margin:0;background:#000"><img src="data:image/' + ext + ';base64,' + base64 + '" style="max-width:100%;image-rendering:pixelated"></body></html>' };
            fetch('https://api.github.com/gists', {
                method: 'POST',
                headers: { Authorization: 'token ' + token, 'Content-Type': 'application/json' },
                body: JSON.stringify({ description: 'Pokemon Black screenshot ' + ts, public: false, files: files })
            })
            .then(function(r) {
                if (!r.ok) return r.text().then(function(t){ var m=t; try{m=JSON.parse(t).message||t;}catch(e){} throw new Error(r.status+': '+m); });
                return r.json();
            })
            .then(function(g) {
                var btn = document.getElementById('screenshot-btn-emu');
                if (btn) { btn.style.color = '#20d840'; setTimeout(function(){ btn.style.color = '#18b8c8'; }, 2000); }
                prompt('Screenshot saved — link:', g.html_url);
            })
            .catch(function(e) { alert('Screenshot error:\n' + e.message); });
        });
    </script>
</body>
</html>
