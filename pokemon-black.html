<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pokémon Black — NDS</title>
    <!-- v__CACHE_BUST__ -->
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #000; color: #c8d8e8;
            font-family: "Courier New", Courier, monospace;
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
        }
        #top-bar {
            width: 100%; background: #0a1830; border-bottom: 1px solid #18b8c8;
            display: flex; align-items: center; justify-content: space-between;
            padding: 6px 10px; gap: 8px;
        }
        #top-bar a { color: #18b8c8; text-decoration: none; font-size: 12px; border: 1px solid #18b8c8; border-radius: 3px; padding: 4px 8px; touch-action: manipulation; }
        #top-bar span { font-size: 12px; color: #80d0e8; }
        #screenshot-btn-emu { background: #0a1830; color: #18b8c8; border: 1px solid #18b8c8; border-radius: 3px; padding: 4px 8px; font-size: 12px; cursor: pointer; font-family: "Courier New", Courier, monospace; touch-action: manipulation; }
        #emu-wrap { width: 100%; max-width: 800px; flex: 1; display: flex; flex-direction: column; }
        #game { width: 100%; min-height: 500px; flex: 1; }
        #status { padding: 8px 12px; font-size: 11px; color: #80d0e8; background: #0a1830; border-top: 1px solid #18b8c8; min-height: 24px; word-break: break-all; }
        #loading-screen {
            width: 100%; max-width: 800px; padding: 40px 20px;
            display: flex; flex-direction: column; align-items: center; gap: 20px;
        }
        .load-title { font-size: 16px; color: #18b8c8; letter-spacing: 2px; }
        .load-sub   { font-size: 12px; color: #6090a8; text-align: center; line-height: 1.6; }
        #progress-wrap { width: 100%; max-width: 400px; }
        #progress-bar-bg { background: #060610; border: 1px solid #18b8c8; border-radius: 3px; height: 12px; overflow: hidden; }
        #progress-bar-fill { height: 100%; background: #18b8c8; width: 0%; transition: width 0.3s; }
        #dl-status { font-size: 11px; color: #e8c000; margin-top: 8px; min-height: 16px; text-align: center; word-break: break-all; }
        #debug-bar { width: 100%; max-width: 800px; background: #060610; border-top: 1px solid #222; padding: 5px 10px; display: flex; gap: 6px; flex-wrap: wrap; }
        .dbg-btn { background: #0a1830; color: #e8c000; border: 1px solid #e8c000; border-radius: 3px; padding: 3px 9px; font-size: 11px; font-family: "Courier New", Courier, monospace; cursor: pointer; touch-action: manipulation; }
    </style>
</head>
<body>
    <div id="top-bar">
        <a href="index.html">&#8592; Menu</a>
        <span>Pokémon Black</span>
        <button id="screenshot-btn-emu">&#128247; Screenshot</button>
    </div>

    <div id="loading-screen">
        <div class="load-title">POKÉMON BLACK</div>
        <div class="load-sub" id="load-msg">Checking local cache…</div>
        <div id="progress-wrap" style="display:none">
            <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
            <div id="dl-status"></div>
        </div>
    </div>

    <div id="emu-wrap" style="display:none">
        <div id="game"></div>
        <div id="status">Loading…</div>
    </div>
    <div id="debug-bar">
        <button class="dbg-btn" id="btn-clear-cache">&#128465; Clear ROM Cache</button>
    </div>

    <script>
        (function() {
            // Preserve drawing buffer so screenshots work
            var _orig = HTMLCanvasElement.prototype.getContext;
            HTMLCanvasElement.prototype.getContext = function(type, attrs) {
                if (type === 'webgl' || type === 'webgl2' || type === 'experimental-webgl') {
                    attrs = Object.assign({}, attrs || {}, { preserveDrawingBuffer: true });
                }
                return _orig.call(this, type, attrs);
            };
        })();
    </script>

    <script>
    (function() {
        var ROM_URL  = 'https://github.com/knightdx91-alt/Pokemon-Game/releases/download/roms-v1/pokemon-black.zip';
        var IDB_DB   = 'pokemon-black-rom';
        var IDB_STORE = 'rom';
        var IDB_KEY  = 'blob';

        var loadingEl  = document.getElementById('loading-screen');
        var emuEl      = document.getElementById('emu-wrap');
        var statusEl   = document.getElementById('status');
        var loadMsgEl  = document.getElementById('load-msg');
        var progressWrap = document.getElementById('progress-wrap');
        var progFill   = document.getElementById('progress-bar-fill');
        var dlStatus   = document.getElementById('dl-status');

        function setStatus(msg) { statusEl.textContent = msg; }
        function setMsg(msg)    { loadMsgEl.textContent = msg; }
        function setDl(msg, color) { dlStatus.textContent = msg; dlStatus.style.color = color || '#e8c000'; }
        function setProgress(pct) { progressWrap.style.display = 'block'; progFill.style.width = pct + '%'; }

        // ── IndexedDB ───────────────────────────────────────────────────────
        function openDB() {
            return new Promise(function(res, rej) {
                var r = indexedDB.open(IDB_DB, 1);
                r.onupgradeneeded = function(e) { e.target.result.createObjectStore(IDB_STORE); };
                r.onsuccess = function(e) { res(e.target.result); };
                r.onerror   = function(e) { rej(e.target.error); };
            });
        }
        function idbGet(db) {
            return new Promise(function(res, rej) {
                var r = db.transaction(IDB_STORE,'readonly').objectStore(IDB_STORE).get(IDB_KEY);
                r.onsuccess = function(e) { res(e.target.result || null); };
                r.onerror   = function(e) { rej(e.target.error); };
            });
        }
        function idbPut(db, blob) {
            return new Promise(function(res, rej) {
                var r = db.transaction(IDB_STORE,'readwrite').objectStore(IDB_STORE).put(blob, IDB_KEY);
                r.onsuccess = function() { res(); };
                r.onerror   = function(e) { rej(e.target.error); };
            });
        }
        function idbDel(db) {
            return new Promise(function(res, rej) {
                var r = db.transaction(IDB_STORE,'readwrite').objectStore(IDB_STORE).delete(IDB_KEY);
                r.onsuccess = function() { res(); };
                r.onerror   = function(e) { rej(e.target.error); };
            });
        }

        // ── EmulatorJS launch ───────────────────────────────────────────────
        function launchEJS(blobUrl) {
            loadingEl.style.display = 'none';
            emuEl.style.display = 'flex';
            setStatus('Loading emulator core…');

            window.EJS_player          = '#game';
            window.EJS_core            = 'nds';
            window.EJS_gameUrl         = blobUrl;
            window.EJS_pathtodata      = 'https://cdn.emulatorjs.org/stable/data/';
            window.EJS_color           = '#18b8c8';
            window.EJS_backgroundColor = '#060610';
            window.EJS_startOnLoaded   = true;
            window.EJS_onGameStart     = function() { setStatus('Running — Pokémon Black'); };
            window.EJS_Buttons = {
                playPause:true, restart:true, mute:true, settings:true,
                fullscreen:true, saveState:true, loadState:true,
                screenRecord:false, gamepad:true, cheat:false, volume:true,
                saveSavFiles:true, loadSavFiles:true, quickSave:true, quickLoad:true,
            };
            var s = document.createElement('script');
            s.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
            s.onerror = function() { setStatus('ERROR: Failed to load EmulatorJS.', '#e84040'); };
            document.body.appendChild(s);
        }

        // ── Download with streaming progress ───────────────────────────────
        function downloadROM() {
            setMsg('Downloading Pokémon Black…');
            setProgress(2);
            setDl('Connecting to GitHub…');

            fetch(ROM_URL).then(function(resp) {
                if (!resp.ok) throw new Error('HTTP ' + resp.status);

                var total = parseInt(resp.headers.get('content-length') || '0', 10);

                if (resp.body && resp.body.getReader && total) {
                    var reader = resp.body.getReader();
                    var chunks = [];
                    var loaded = 0;
                    function pump() {
                        return reader.read().then(function(r) {
                            if (r.done) return new Blob(chunks, { type: 'application/zip' });
                            chunks.push(r.value);
                            loaded += r.value.length;
                            var pct = Math.round(loaded / total * 100);
                            var mb  = (loaded  / 1048576).toFixed(1);
                            var tot = (total   / 1048576).toFixed(0);
                            setProgress(pct);
                            setDl('Downloading ' + mb + ' / ' + tot + ' MB (' + pct + '%)');
                            return pump();
                        });
                    }
                    return pump();
                }

                // Fallback: no streaming
                setDl('Downloading (~106 MB) — please wait…');
                setProgress(50);
                return resp.blob();

            }).then(function(blob) {
                setDl('Saving to local cache…', '#20d840');
                setProgress(100);
                return openDB().then(function(db) {
                    return idbPut(db, blob).then(function() {
                        launchEJS(URL.createObjectURL(blob));
                    });
                });
            }).catch(function(err) {
                setMsg('Download failed');
                setDl('Error: ' + err.message + '\n\nTry refreshing the page.', '#e84040');
                console.error('[ROM] Download failed:', err);
            });
        }

        // ── Boot: check cache, then download ───────────────────────────────
        openDB().then(function(db) {
            return idbGet(db).then(function(cached) {
                if (cached) {
                    setMsg('Loading from cache…');
                    launchEJS(URL.createObjectURL(cached));
                } else {
                    downloadROM();
                }
            });
        }).catch(function(err) {
            console.warn('[ROM] IndexedDB error, downloading directly:', err);
            downloadROM();
        });

        // ── Clear cache ─────────────────────────────────────────────────────
        document.getElementById('btn-clear-cache').addEventListener('click', function() {
            openDB().then(function(db) { return idbDel(db); })
                .then(function() { location.reload(); })
                .catch(function(e) { alert('Clear failed: ' + e.message); });
        });
    })();
    </script>

    <script src="emulator-saves.js?v=__CACHE_BUST__"></script>
    <script src="emulator-screenshot.js?v=__CACHE_BUST__"></script>
</body>
</html>
