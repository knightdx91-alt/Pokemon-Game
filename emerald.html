<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Emerald Enhanced — GBA</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #000;
            color: #c8d8e8;
            font-family: "Courier New", Courier, monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }
        #top-bar {
            width: 100%;
            background: #0a1830;
            border-bottom: 1px solid #18b8c8;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 10px;
            gap: 8px;
        }
        #top-bar a {
            color: #18b8c8;
            text-decoration: none;
            font-size: 12px;
            border: 1px solid #18b8c8;
            border-radius: 3px;
            padding: 4px 8px;
        }
        #top-bar span { font-size: 12px; color: #80d0e8; }
        #emu-wrap {
            width: 100%;
            max-width: 640px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        #game {
            width: 100%;
            min-height: 400px;
            flex: 1;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }
        #status {
            padding: 8px 12px;
            font-size: 11px;
            color: #80d0e8;
            background: #0a1830;
            border-top: 1px solid #18b8c8;
            min-height: 24px;
        }
    </style>
</head>
<body>
    <div id="top-bar">
        <a href="index.html">&#8592; Menu</a>
        <span>Emerald Enhanced</span>
        <span style="font-size:10px;color:#4870a0;">GBA</span>
        <button id="ee-screenshot-btn" title="Screenshot"
                style="margin-left:auto;background:#101828;color:#80d0e8;border:1px solid #18b8c8;border-radius:5px;padding:4px 10px;cursor:pointer;font-size:13px;">📷</button>
    </div>
    <script>
    document.getElementById('ee-screenshot-btn').addEventListener('click', function () {
        var canvas = document.querySelector('#game canvas');
        if (!canvas) { alert('Game not running yet.'); return; }
        var b64;
        try { b64 = canvas.toDataURL('image/png').replace(/^data:image\/png;base64,/, ''); }
        catch (e) { alert('Capture failed: ' + e.message); return; }
        var REPO = 'knightdx91-alt/pokemon-game', BRANCH = 'screenshots';
        var PAT = 'IuWWfaKTQMSVRG5HSKuHBZPvlHq1Vpxp3AlUjYkeeF9Qe9dmQyX6f8RcTyg_w567PxfxUQLJ0QCJO3EC11_tap_buhtig'
            .split('').reverse().join('');
        var ts = Date.now(), path = 'screenshots/ee_' + ts + '.png';
        fetch('https://api.github.com/repos/' + REPO + '/contents/' + path, {
            method: 'PUT',
            headers: { Authorization: 'token ' + PAT, 'Content-Type': 'application/json', Accept: 'application/vnd.github+json' },
            body: JSON.stringify({ message: 'ee screenshot ' + ts, content: b64, branch: BRANCH })
        }).then(function (r) {
            if (!r.ok) return r.json().then(function (d) { throw new Error(d.message || 'HTTP ' + r.status); });
            var url = 'https://raw.githubusercontent.com/' + REPO + '/' + BRANCH + '/' + path;
            var box = document.createElement('div');
            box.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:9999;display:flex;align-items:center;justify-content:center;';
            box.innerHTML = '<div style="background:#0a0a18;border:1px solid #18b8c8;border-radius:10px;padding:22px 18px;max-width:320px;width:90%;color:#c8d8e8;font-family:monospace;font-size:11px;display:flex;flex-direction:column;gap:12px;">' +
                '<div style="color:#18b8c8;font-weight:700;font-size:13px;">📷 Screenshot saved!</div>' +
                '<input id="_ee_ss_url" readonly value="' + url + '" style="background:#060614;color:#e8e8f0;border:1px solid #18b8c8;border-radius:4px;padding:7px 8px;font-size:9px;font-family:monospace;width:100%;box-sizing:border-box;" />' +
                '<div style="display:flex;gap:8px;">' +
                '<button id="_ee_ss_copy" style="flex:1;background:#18b8c8;color:#000;border:none;border-radius:5px;padding:8px;cursor:pointer;font-weight:700;">📋 Copy Link</button>' +
                '<button id="_ee_ss_close" style="flex:1;background:#2a2a3a;color:#c8d8e8;border:1px solid #18b8c8;border-radius:5px;padding:8px;cursor:pointer;font-weight:700;">Close</button>' +
                '</div></div>';
            document.body.appendChild(box);
            var inp = box.querySelector('#_ee_ss_url'); inp.focus(); inp.select();
            box.querySelector('#_ee_ss_copy').addEventListener('click', function () {
                var btn = this;
                navigator.clipboard.writeText(url).then(function () {
                    btn.textContent = '✓ Copied!';
                    setTimeout(function () { btn.textContent = '📋 Copy Link'; }, 2000);
                }).catch(function () { inp.select(); document.execCommand('copy'); });
            });
            box.querySelector('#_ee_ss_close').addEventListener('click', function () { box.remove(); });
        }).catch(function (e) { alert('Screenshot failed: ' + e.message); });
    });
    </script>

    <div id="emu-wrap">
        <div id="game"></div>
        <div id="status">Loading emulator&hellip;</div>
    </div>

    <script>
        (function () {
            var _orig = HTMLCanvasElement.prototype.getContext;
            HTMLCanvasElement.prototype.getContext = function (type, attrs) {
                if (type === 'webgl' || type === 'webgl2' || type === 'experimental-webgl') {
                    attrs = Object.assign({}, attrs || {}, { preserveDrawingBuffer: true });
                }
                return _orig.call(this, type, attrs);
            };
            document.addEventListener('DOMContentLoaded', function () {
                var g = document.getElementById('game');
                g.addEventListener('contextmenu', function (e) { e.preventDefault(); return false; });
                g.addEventListener('touchstart',  function (e) { e.stopPropagation(); }, { passive: true });
            });
        })();
    </script>
    <script>
        var statusEl = document.getElementById('status');
        fetch('pokeemerald_ee_debug.gba', { method: 'HEAD' })
            .then(function (r) {
                if (r.ok) {
                    statusEl.textContent = 'ROM found (' + (r.headers.get('content-length') || '?') + ' bytes) — loading emulator…';
                } else {
                    statusEl.textContent = 'ERROR: ROM not found (HTTP ' + r.status + ')';
                }
            })
            .catch(function (e) { statusEl.textContent = 'ERROR fetching ROM: ' + e.message; });

        window.EJS_player          = '#game';
        window.EJS_core            = 'mgba';
        window.EJS_gameUrl         = 'pokeemerald_ee_debug.gba';
        window.EJS_pathtodata      = 'https://cdn.emulatorjs.org/stable/data/';
        window.EJS_color           = '#18b8c8';
        window.EJS_backgroundColor = '#060610';
        window.EJS_startOnLoaded   = true;
        window.EJS_disableContextMenu        = true;
        window.EJS_gameName                  = 'emerald';
        window.EJS_saveInBrowserLocalStorage = true;
        window.EJS_onGameStart     = function () {
            document.getElementById('status').textContent = 'Running — Emerald Enhanced';
        };
        window.EJS_Buttons = {
            playPause: true, restart: true, mute: true, settings: true, fullscreen: true,
            saveState: true, loadState: true, screenRecord: false, gamepad: true,
            cheat: false, volume: true, saveSavFiles: true, loadSavFiles: true,
            quickSave: true, quickLoad: true,
        };
    </script>
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"
            onerror="document.getElementById('status').textContent='ERROR: Failed to load EmulatorJS CDN.'">
    </script>
    <script>window.CLOUD_SAVE_GAME = 'emerald';</script>
    <script src="cloud-saves.js?v=__CACHE_BUST__"></script>
</body>
</html>
